<style>

  #bar{padding:10px 14px;display:flex;gap:12px;align-items:center;border-bottom:1px solid #21262d}
  #nattabs{display:flex;gap:6px}
  #nattabs button{display:flex;align-items:center;gap:5px;background:#161b22;color:#8b949e;border:1px solid #30363d;border-radius:8px;padding:6px 12px;font-size:14px;font-weight:700;cursor:pointer}
  #nattabs button.on{background:#1f6feb;color:#fff;border-color:#1f6feb}
  #nattabs img{width:21px;height:15px;border-radius:2px;object-fit:cover;display:block}
  #meta{font-size:12px;color:#8b949e;margin-left:auto}
  #map{width:100vw;height:calc(100vh - 52px)}
  .sector-label{font-weight:700;fill:#e6edf3;font-size:13px}
  .ind-label{fill:#c9d1d9;font-size:10px;opacity:.85}
  .cell text{pointer-events:none}
  .tick{font-weight:700}
  .pct{opacity:.9}
  /* 모바일(≤768px): 트리맵을 크게 렌더해 좌우/상하로 밀어보기(팬) + 핀치줌. 화면폭 맞춤=글자 안보임 회피. PC 무영향. */
  @media (max-width:768px){
    #bar{flex-wrap:wrap;gap:8px;padding:8px 10px}
    #nattabs{flex-wrap:wrap}
    #nattabs button{padding:5px 9px;font-size:12px}
    #nattabs img{width:18px;height:13px}
    #meta{margin-left:0;flex-basis:100%;order:3}
    /* 맵은 svg width 속성(확대 렌더)을 그대로 두고, 컨테이너가 가로/세로 스크롤(팬) */
    body{overflow:auto;-webkit-overflow-scrolling:touch}
    #map{width:auto;height:auto;display:block}
  }
</style></head>

  const W=MOBILE?940:Math.max(document.documentElement.clientWidth||window.innerWidth||1280,320);
  const H=MOBILE?1180:Math.max((document.documentElement.clientHeight||window.innerHeight||720)-52,300);
  svg.attr('viewBox',`0 0 ${W} ${H}`).attr('width',W).attr('height',H);
  const root=d3.hierarchy({children:d.sectors},n=>n.children||n.industries||n.stocks)
    .sum(n=>(n.children||n.industries||n.stocks)?0:(n.marketCap||0))  // 리프(종목)만 합산—섹터/업종 중복합산 방지
    .sort((a,b)=>b.value-a.value);
  // 업종 라벨 띠는 '충분히 큰 업종'에만 부여(작은 업종은 0 → 빈공간 방지). depth2 size는 부모 타일 후 결정됨.
  const indBig=n=>n.depth===2 && (n.x1-n.x0)>64 && (n.y1-n.y0)>46;
  d3.treemap().size([W,H]).paddingOuter(2)
    .paddingInner(n=>n.depth===1?2:1)             // 업종 간 간격 살짝 ↑ → 그룹 구분
    .paddingTop(n=>n.depth===1?14:(indBig(n)?11:0))(root);
  const g=svg.append('g');
  // 섹터(depth1) 라벨
  g.selectAll('.sector-label').data(root.children).enter().append('text')
    .attr('class','sector-label').attr('x',d=>d.x0+4).attr('y',d=>d.y0+11)
    .text(d=>`${d.data.name}  ${d.data.changeRate>0?'+':''}${d.data.changeRate??''}%`);
  // 업종(depth2) 라벨 — 라벨 띠가 부여된 업종에만
  g.selectAll('.ind-label').data(root.descendants().filter(indBig))
    .enter().append('text').attr('class','ind-label')
    .attr('x',d=>d.x0+3).attr('y',d=>d.y0+9)
    .text(d=>{const max=Math.floor((d.x1-d.x0-4)/7);const nm=d.data.name;return nm.length>max?nm.slice(0,max):nm;});
  // 종목(leaf) 타일
  const leaf=g.selectAll('.cell').data(root.leaves()).enter().append('g')
    .attr('class','cell').attr('transform',d=>`translate(${d.x0},${d.y0})`);
  leaf.append('rect').attr('width',d=>Math.max(0,d.x1-d.x0)).attr('height',d=>Math.max(0,d.y1-d.y0))
    .attr('fill',d=>color(crOf(d))).attr('stroke','#0d1117').attr('stroke-width',.5)
    .style('cursor','pointer')
    .append('title').text(d=>{const cr=crOf(d);const ah=isExt(d)?' (시간외)':'';return `${d.data.name} (${d.data.code})\n${cr>0?'+':''}${cr}%${ah} · 시총 ${fmtCap(d.data.marketCap)}`;});
  // 신고가 코너 마커 (역대=금색 / 52주=초록 삼각형, 우상단)
  leaf.filter(d=>NH[d.data.code] && (d.x1-d.x0)>13 && (d.y1-d.y0)>13).append('path')
    .attr('d',d=>{const w=Math.max(0,d.x1-d.x0);return `M${w-10},0 L${w},0 L${w},10 Z`;})
    .attr('fill',d=>NH[d.data.code]==='ath'?'#fbbf24':'#3fb950').attr('pointer-events','none');
  // 종목 클릭 → 부모 SPA 해외 팝업 (iframe 내에서만)
  leaf.on('click',(event,d)=>{
    const key=(curNat==='USA')?d.data.code.split('.')[0].toUpperCase():d.data.code;
    try{ if(window.parent&&window.parent!==window&&window.parent.glPopup) window.parent.glPopup(key,{name:d.data.name,change:crOf(d)}); }catch(e){}
  });
  const isUS = (nat==='USA');
  leaf.each(function(d){
    const w=d.x1-d.x0,h=d.y1-d.y0; if(w<26||h<14) return;
    const t=d3.select(this);
    const ticker=d.data.code.split('.')[0];
    // 미국=티커, 그 외=한글명(없으면 티커). 폭에 맞게 잘라냄(한글은 글자폭≈fs, 영문≈fs*0.62)
    let label = isUS ? ticker : (d.data.name || ticker);
    const fs=Math.min(13,Math.max(8,w/5));
    const cw = /[가-힣]/.test(label) ? fs*1.02 : fs*0.62;
    const maxc=Math.max(1,Math.floor((w-3)/cw));
    if(label.length>maxc) label=label.slice(0,maxc);
    t.append('text').attr('class','tick').attr('x',w/2).attr('y',h/2-1).attr('text-anchor','middle')
     .attr('fill','#fff').attr('font-size',fs).text(label);
    if(h>30){ const cr=crOf(d); t.append('text').attr('class','pct').attr('x',w/2).attr('y',h/2+11).attr('text-anchor','middle')
     .attr('fill','#fff').attr('font-size',Math.min(11,Math.max(7,w/7)))
     .text((cr>0?'+':'')+(cr??'')+'%'); }
  });
  svg.append('text').attr('x',W/2).attr('y',H/2).attr('text-anchor','middle').attr('dominant-baseline','middle')
     .attr('fill','#ffffff').attr('opacity',0.15).attr('font-size',Math.max(30,W/16)).attr('font-weight','700')
     .attr('letter-spacing','0.1em').attr('pointer-events','none').text('moneyland.co.kr');
}
const FCC={USA:'us',CHN:'cn',HKG:'hk',JPN:'jp',VNM:'vn'};
const tabs=document.getElementById('nattabs');
if(!curNat)curNat=Object.keys(DATA)[0];
function renderNatTabs(){ tabs.innerHTML=Object.keys(DATA).map(n=>`<button class="${n===curNat?'on':''}" onclick="setNat('${n}')"><img src="https://flagcdn.com/w40/${FCC[n]||''}.png" alt="">${DATA[n].nationName}</button>`).join(''); }
function setNat(n){ curNat=n; draw(); renderNatTabs(); }
renderNatTabs();
// 레이아웃 확정 후 렌더 (초기 innerWidth 미확정 방지)
function draw(){ render(curNat); }
// 미국 시간외 시세 로드(+3분 갱신) — 부모 SPA의 global_prices_live 재사용
function loadLive(){ fetch('/moneyweb/api/world_marketmap_live.json?t='+Date.now())
  .then(r=>r.json()).then(j=>{LIVE=j.prices||{};LIVE_AT=j.updatedAt||j.updated_at||'';draw();}).catch(()=>{}); }
function loadNH(){ fetch('/moneyweb/api/world_newhigh.json?t='+Date.now())
  .then(r=>r.json()).then(j=>{NH={};Object.values(j.items||{}).forEach(a=>a.forEach(x=>{NH[x.code]=(x.type||[]).includes('ath')?'ath':'52w';}));draw();}).catch(()=>{}); }
loadLive(); setInterval(loadLive,180000);
loadNH(); setInterval(loadNH,180000);
window.addEventListener('load',draw);
requestAnimationFrame(()=>requestAnimationFrame(draw));
let rz;window.addEventListener('resize',()=>{clearTimeout(rz);rz=setTimeout(draw,150);});
</script></body></html>
