<!doctype html><html lang="ko"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>투자자 수급 매트릭스</title>
<style>
:root{--bg:#0f1115;--panel:#171a21;--line:#262b36;--txt:#e6e9ef;--mut:#8b93a3;
--buy:#ff5b5b;--sell:#3b82f6;--up:#ff5b5b;--dn:#3b82f6;}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--txt);
font:13px/1.4 -apple-system,"Malgun Gothic",sans-serif}
header{position:sticky;top:0;z-index:5;background:var(--bg);padding:14px 18px;
border-bottom:1px solid var(--line)}
h1{margin:0 0 10px;font-size:17px}
.meta{color:var(--mut);font-size:12px;margin-bottom:10px}
.toggles{display:flex;gap:18px;flex-wrap:wrap}
.grp{display:flex;gap:6px;align-items:center}
.grp .lbl{color:var(--mut);font-size:11px;margin-right:2px}
button.t{background:var(--panel);color:var(--mut);border:1px solid var(--line);
padding:5px 12px;border-radius:7px;cursor:pointer;font-size:12px}
button.t.on{background:#2a3140;color:#fff;border-color:#3a4250}
.matrix{display:flex;gap:10px;overflow-x:auto;padding:16px 18px}
.col{flex:0 0 258px;background:var(--panel);border:1px solid var(--line);border-radius:10px;overflow:hidden}
.col h2{margin:0;font-size:13px;padding:7px 10px;background:#1d212a;border-bottom:1px solid var(--line)}
table{width:100%;border-collapse:collapse}
td,th{padding:3px 5px;font-size:12px;border-bottom:1px solid #1f2430;white-space:nowrap}
th{color:var(--mut);font-weight:600;font-size:11px;text-align:right}
th.l,td.l{text-align:left}
td.r{text-align:right;font-variant-numeric:tabular-nums}
.rk{color:var(--mut);width:22px}
.nm{font-weight:600;display:inline-block;width:6.6em;overflow:hidden;text-overflow:clip;white-space:nowrap;vertical-align:bottom}
td.amt{font-weight:600}
.unit{color:var(--mut);font-size:11px;font-weight:400}
.net.buy{color:var(--buy)}.net.sell{color:var(--sell)}
.up{color:var(--up)}.dn{color:var(--dn)}
.sub{color:var(--mut);font-size:10px}
.rs{display:inline-block;font-size:9px;padding:0 4px;border-radius:4px;background:#243; color:#7fdca0;margin-left:4px}
.empty{padding:20px;text-align:center;color:var(--mut)}
.viewtabs{margin-bottom:10px}
.vt{background:none;border:none;color:var(--mut);font-size:16px;font-weight:700;cursor:pointer;padding:2px 0;margin-right:20px}
.vt.on{color:var(--txt);border-bottom:2px solid #4a90e2}
/* 모바일: 4개 뷰탭(장중 시장수급/투자자 수급/RS/공매도) 한 줄에 — 폰트·간격 축소, 폴백 가로스크롤 */
@media(max-width:560px){
  header{padding:11px 12px}
  .viewtabs{margin-bottom:8px;display:flex;flex-wrap:nowrap;white-space:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch}
  .vt{font-size:11.5px;margin-right:11px;flex:0 0 auto}
  .vt:last-child{margin-right:0}
}
.rstbl-wrap{padding:14px 18px;overflow-x:auto}
.rstbl{width:100%;min-width:940px;border-collapse:collapse}
.rstbl th,.rstbl td{padding:4px 9px;font-size:12px;border-bottom:1px solid #1f2430;white-space:nowrap;text-align:right}
.rstbl th{position:sticky;top:0;background:#1d212a;color:var(--mut);font-size:11px;font-weight:600;z-index:1}
.rstbl th.l,.rstbl td.l{text-align:left}
.rstbl tbody tr:hover td{background:#1b1f27}
.rstbl th.sortable{cursor:pointer;user-select:none}
.rstbl th.sortable:hover{color:var(--txt)}
.sl-chip{padding:2px 7px;border-radius:4px;background:#23262d;border:1px solid var(--line)}
.sl-chip.warn{background:#2c2410;border-color:#5a4a1a;color:#e0b357}
.sl-src{font-size:10px;padding:1px 5px;border-radius:3px;background:#23262d;color:var(--mut)}
.sl-src.ksd{background:#2c2410;color:#e0b357}
.sl-fut{font-size:9px;padding:0 3px;margin-left:3px;border-radius:3px;background:#16324a;color:#6cb6ff;vertical-align:middle}
.sl-ptbl .chg{font-size:10px;font-weight:500;margin-left:4px}
.sl-ptbl .nxtm{font-size:8px;color:#e0b357;margin-left:1px;vertical-align:top}
/* 패널 최소폭 보장 → 넓으면 4열, 좁으면 자동 3·2·1열 (내용 안 잘림) */
.sl-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(410px,1fr));gap:7px}
.sl-panel{background:var(--panel);border:1px solid var(--line);border-radius:10px;overflow:hidden;min-width:0}
.sl-panel h4{margin:0;font-size:12px;font-weight:600;padding:6px 8px;background:#1d212a;border-bottom:1px solid var(--line)}
/* table-layout auto: 숫자 컬럼은 내용 크기로(안 잘림), 여유 공간은 종목명 칸이 흡수 */
.sl-ptbl{width:100%;border-collapse:collapse}
.sl-ptbl th,.sl-ptbl td{padding:4px 5px;font-size:10px;border-bottom:1px solid #1b1f27;white-space:nowrap;text-align:right}
.sl-ptbl th{color:var(--mut);font-size:9.5px;font-weight:600;cursor:pointer;user-select:none;position:sticky;top:0;background:#1d212a}
.sl-ptbl th:hover{color:var(--txt)}
.sl-ptbl th.l,.sl-ptbl td.l{text-align:left;width:100%;padding-left:6px}
.sl-ptbl th.rk,.sl-ptbl td.rk{width:14px;text-align:center;color:var(--mut);padding:4px 2px}
.sl-ptbl .nm{display:inline-block;font-size:12px;max-width:7.5em;overflow:hidden;text-overflow:ellipsis;vertical-align:bottom}
.sl-ptbl .sub{font-size:10px}
.sl-ptbl tbody tr:hover td{background:#1b1f27}
.sl-src1{font-size:9px;padding:1px 4px;border-radius:3px;background:#23262d;color:var(--mut)}
.sl-src1.d{background:#2c2410;color:#e0b357}
.scr{color:#ff8f5b;font-weight:600}
.idnr4{display:inline-block;font-size:10px;padding:0 5px;border-radius:4px;background:#3a2d10;color:#e0b341}
/* 장중 시장수급 */
.flow-wrap{display:flex;gap:14px;padding:16px 18px;flex-wrap:wrap}
.flow-mkt{flex:1 1 440px;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px 16px}
.fm-head{display:flex;align-items:baseline;gap:10px;margin-bottom:12px;border-bottom:1px solid var(--line);padding-bottom:10px}
.fm-name{font-size:18px;font-weight:800}
.fm-idx{font-size:16px;font-weight:700;font-variant-numeric:tabular-nums;margin-left:auto}
.fm-chg{font-size:13px;font-weight:700}
.fm-big{display:flex;gap:10px;margin-bottom:14px}
.bigc{flex:1;background:#11141a;border:1px solid var(--line);border-radius:9px;padding:9px 11px}
.bigc .lab{color:var(--mut);font-size:11px;margin-bottom:3px}
.bigc .val{font-size:18px;font-weight:800;font-variant-numeric:tabular-nums}
.bar{height:6px;border-radius:3px;background:#222732;margin-top:8px;position:relative;overflow:hidden}
.bar > i{position:absolute;top:0;bottom:0;display:block}
.fm-sub{display:grid;grid-template-columns:repeat(2,1fr);gap:0 18px;margin-bottom:12px}
.subrow{display:flex;justify-content:space-between;font-size:12px;padding:3px 0;border-bottom:1px solid #1b1f27}
.subrow .k{color:var(--mut)}
.subrow .v{font-variant-numeric:tabular-nums;font-weight:600}
.fm-sectors h3{font-size:12px;color:var(--mut);margin:8px 0 4px}
.fm-sectors table{width:100%}
.live{display:inline-block;font-size:10px;font-weight:700;color:#fff;background:#e0392b;padding:1px 8px;border-radius:10px;vertical-align:middle}
.live.off{background:#555}
.flow-foot{padding:2px 18px 20px;color:var(--mut);font-size:11px;line-height:1.5}
.fm-advdec{display:flex;gap:10px;align-items:center;font-size:12px;margin:-4px 0 12px;color:var(--mut)}
.fm-advdec b{font-variant-numeric:tabular-nums}
.fm-prog{display:flex;flex-direction:column;gap:6px;font-size:12px;background:#11141a;border:1px solid var(--line);border-radius:8px;padding:7px 11px;margin-bottom:12px}
.prog-nums{display:flex;gap:16px}
.fm-prog .pl{color:var(--mut)}
.fm-prog b{font-variant-numeric:tabular-nums}
.spark{width:100%;height:32px;display:block}
.chart-box{margin:-2px 0 12px}
.chart-head{display:flex;justify-content:space-between;align-items:center;font-size:11px;color:var(--mut);margin-bottom:3px}
.lgd{display:flex;gap:11px}
.lgd i{display:inline-block;width:8px;height:8px;border-radius:2px;margin-right:3px;vertical-align:middle}
.lchart{width:100%;height:auto;display:block;background:#11141a;border:1px solid var(--line);border-radius:8px}
.ichart{width:100%;height:auto;display:block;background:#11141a;border:1px solid var(--line);border-radius:8px}
.chart-wait{font-size:11px;color:var(--mut);padding:16px;text-align:center;background:#11141a;border:1px solid var(--line);border-radius:8px}
.top-sec{padding:8px 18px 4px}
.top-sec h2{font-size:14px;margin:6px 0 10px;font-weight:700}
.top-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px}
@media(max-width:1100px){.top-grid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:700px){.top-grid{grid-template-columns:repeat(2,1fr)}}
.topcol{background:var(--panel);border:1px solid var(--line);border-radius:10px;overflow:hidden}
.topcol h3{margin:0;font-size:12px;padding:7px 10px;background:#1d212a;border-bottom:1px solid var(--line)}
.topcol table{width:100%;border-collapse:collapse}
.topcol td{padding:3px 8px;font-size:12px;border-bottom:1px solid #1b1f27;white-space:nowrap}
.fgn-wrap{padding:14px 18px 4px}
.fgn-title{font-size:15px;font-weight:700;margin-bottom:9px}
.fgn-ctrl{display:flex;gap:16px;flex-wrap:wrap;align-items:center;margin-bottom:11px}
.fgn-ctrl .seg{display:flex;gap:5px;align-items:center}
.fgn-ctrl .lbl{color:var(--mut);font-size:11px}
.fbtn{background:var(--panel);color:var(--mut);border:1px solid var(--line);padding:4px 11px;border-radius:7px;cursor:pointer;font-size:12px}
.fbtn.on{background:#2a3140;color:#fff;border-color:#3a4250}
.fbtn:disabled{opacity:.32;cursor:default}
.fgn-cols{display:flex;gap:10px;overflow-x:auto}
.fgn-col{flex:1 1 0;min-width:300px;background:var(--panel);border:1px solid var(--line);border-radius:10px;overflow:hidden}
.fgn-col h4{margin:0;font-size:12px;padding:7px 10px;background:#1d212a;border-bottom:1px solid var(--line)}
.fgn-tbl{width:100%;border-collapse:collapse}
.fgn-tbl th,.fgn-tbl td{padding:4px 8px;font-size:12px;border-bottom:1px solid #1b1f27;white-space:nowrap;text-align:right}
.fgn-tbl th{color:var(--mut);font-size:11px;font-weight:600}
.fgn-tbl th.l,.fgn-tbl td.l{text-align:left}
.dys{font-variant-numeric:tabular-nums}
.ml-wm-fixed{position:fixed;left:0;right:0;top:50%;transform:translateY(-50%);text-align:center;
  font:800 8vw/1 sans-serif;color:#fff;opacity:.11;letter-spacing:.15em;pointer-events:none;
  z-index:9;white-space:nowrap;overflow:hidden}
</style></head><body>

</header>

function setView(v){
  view = v;
  document.querySelectorAll(".vt").forEach(b=>b.classList.toggle("on", b.dataset.view===v));
  document.getElementById("sugup-toggles").style.display = v==="sugup"?"flex":"none";

  document.getElementById("rsview").style.display = v==="rs"?"block":"none";
  document.getElementById("slview").style.display = v==="sl"?"block":"none";
  document.getElementById("flowview").style.display = v==="flow"?"block":"none";

function fMin(t){ return (+t.slice(0,2))*60 + (+t.slice(2)); }
const FLOW_DEFS = [["ind","개인","var(--buy)"],["frgnr","외국인","var(--sell)"],
                   ["orgn","기관","#e0b341"],["prog","프로그램","#a78bfa"]];

// 통합 추이 차트: 개인·외국인·기관·프로그램 4선 + 라인 끝 라벨/금액
function fLineChart(points, key){
  const pts = (points||[]).filter(p=>p[key]);
  if(pts.length < 2) return '<div class="chart-wait">장중 추이 누적 중… (매분 갱신)</div>';
  const W=452,H=180, L=6,R=326,T=12,B=156, t0=540,t1=930;
  const S = FLOW_DEFS.map(d=>({name:d[1], color:d[2],
    pts: pts.map(p=>[Math.max(t0,Math.min(t1,fMin(p.t))), p[key][d[0]]||0])}));
  const all = [].concat(...S.map(s=>s.pts.map(d=>d[1])));
  const mn=Math.min(0,...all), mx=Math.max(0,...all), rng=(mx-mn)||1;
  const X=t=>L+((t-t0)/(t1-t0))*(R-L), Y=v=>T+(1-(v-mn)/rng)*(B-T);
  const z=Y(0).toFixed(1);
  let s = `<svg class="lchart" viewBox="0 0 ${W} ${H}">`
    + `<line x1="${L}" y1="${z}" x2="${R}" y2="${z}" stroke="#3a4150" stroke-width="0.6"/>`;
  ["09","12","15"].forEach((t,k)=>{ const x=(L+(k/2)*(R-L)).toFixed(1);
    s += `<text x="${x}" y="${H-3}" fill="#5f636e" font-size="10">${t}</text>`; });
  S.forEach(se=>{ const pl=se.pts.map(d=>X(d[0]).toFixed(1)+","+Y(d[1]).toFixed(1)).join(" ");
    const ey=Y(se.pts[se.pts.length-1][1]).toFixed(1);
    s += `<polyline points="${pl}" fill="none" stroke="${se.color}" stroke-width="1.7"/>`
       + `<circle cx="${R}" cy="${ey}" r="2.2" fill="${se.color}"/>`; });
  const labs = S.map(se=>({name:se.name,color:se.color,v:se.pts[se.pts.length-1][1],
    y:Y(se.pts[se.pts.length-1][1])})).sort((a,b)=>a.y-b.y);
  for(let i=1;i<labs.length;i++){ if(labs[i].y-labs[i-1].y<13) labs[i].y=labs[i-1].y+13; }
  labs.forEach(l=>{ s += `<text x="${R+6}" y="${(l.y+3).toFixed(1)}" fill="${l.color}" font-size="11" font-weight="600">${l.name} ${fEok(l.v)}</text>`; });
  return s + `</svg>`;
}

// 지수 흐름 차트 (상승=빨강/하락=파랑, 끝에 지수값)
function fIdxChart(points, key, up){
  const pts = (points||[]).filter(p=>p[key] && p[key].idx);
  if(pts.length < 2) return '';
  const W=440,H=60, L=6,R=372,T=8,B=48, t0=540,t1=930;
  const ds = pts.map(p=>[Math.max(t0,Math.min(t1,fMin(p.t))), p[key].idx]);
  const vs = ds.map(d=>d[1]); const mn=Math.min(...vs), mx=Math.max(...vs), rng=(mx-mn)||1;
  const col = up ? "var(--buy)" : "var(--sell)";
  const X=t=>L+((t-t0)/(t1-t0))*(R-L), Y=v=>T+(1-(v-mn)/rng)*(B-T);
  const pl = ds.map(d=>X(d[0]).toFixed(1)+","+Y(d[1]).toFixed(1)).join(" ");
  const ey = Y(vs[vs.length-1]).toFixed(1);
  return `<svg class="ichart" viewBox="0 0 ${W} ${H}"><polyline points="${pl}" fill="none" stroke="${col}" stroke-width="1.6"/>`
    + `<circle cx="${R}" cy="${ey}" r="2.2" fill="${col}"/>`
    + `<text x="${R+6}" y="${(+ey+3).toFixed(1)}" fill="${col}" font-size="11" font-weight="600">${vs[vs.length-1].toLocaleString()}</text></svg>`;
}

function fEok(v){ if(v===null||v===undefined) return "-"; const s=v>=0?"+":""; return s+Math.round(v).toLocaleString(); }
function fCls(v){ return v>=0?"net buy":"net sell"; }
function fSpark(series){
  if(!series || series.length<2) return "";
  const vs=series.map(p=>p.v), n=series.length, W=200, H=32;
  const mn=Math.min(0,...vs), mx=Math.max(0,...vs), rng=(mx-mn)||1;
  const X=i=>(i/(n-1)*W), Y=v=>(H-((v-mn)/rng)*H);
  const pts=series.map((p,i)=>`${X(i).toFixed(1)},${Y(p.v).toFixed(1)}`).join(" ");
  const z=Y(0).toFixed(1), last=vs[vs.length-1], col=last>=0?"var(--buy)":"var(--sell)";
  return `<svg class="spark" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">`
    + `<polygon points="0,${z} ${pts} ${W},${z}" fill="${col}" opacity="0.12"/>`
    + `<line x1="0" y1="${z}" x2="${W}" y2="${z}" stroke="#3a4150" stroke-width="0.5"/>`
    + `<polyline points="${pts}" fill="none" stroke="${col}" stroke-width="1.3"/></svg>`;
}

const SL_PANEL_N = 25;
function slMd(ymd){ return ymd ? (+ymd.slice(4,6))+"/"+(+ymd.slice(6,8)) : "-"; }
function slFmt(key,v){
  if(v==null) return '<span style="color:var(--mut)">-</span>';
  if(key==="sb_amt"||key==="st_amt"||key==="loan_amt") return fmtMcap(v);
  if(key==="sb_rt"||key==="st_rt") return v.toFixed(2)+"%";
  if(key==="cover") return v.toFixed(1)+"일";
  if(key==="loan_d1"||key==="loan_w1"){ const s=v>0?"+":""; return `<span class="${v>0?'up':(v<0?'dn':'')}">${s}${v.toFixed(1)}%</span>`; }
  if(key==="recall"||key==="rdmp"||key==="loan_q") return v.toLocaleString();
  return v;
}
function slSortBy(viewKey,col){
  const s=slSort[viewKey];
  if(s && s.col===col) s.dir=-s.dir; else slSort[viewKey]={col:col,dir:-1};

  h+=`<div class="sl-grid">`+SL_ORDER.map(slPanel).join("")+`</div>`;
  h+=`<div style="font-size:11px;color:var(--mut);margin-top:8px">패널당 상위 ${SL_PANEL_N}종목 · 종목옆 등락률=종가기준(<sup class="nxtm">N</sup>=NXT종가) · 출처 <span class="sl-src1 d">D</span>=예탁원(상위~225) <span class="sl-src1">S</span>=한국투자(전종목) · <span class="sl-fut">선</span>=주식선물 · 컬럼클릭=정렬 · 종목클릭=상세</div>`;
  v.innerHTML=h;
}

document.querySelectorAll("button.t").forEach(b=>b.addEventListener("click",()=>{
  sel[b.dataset.k]=b.dataset.v; render();
