<meta name="viewport" content="width=device-width,initial-scale=1">
<title>투자자 수급 매트릭스</title>
<style>
:root{--bg:#0f1115;--panel:#171a21;--line:#262b36;--txt:#e6e9ef;--mut:#8b93a3;
--buy:#ff5b5b;--sell:#3b82f6;--up:#ff5b5b;--dn:#3b82f6;}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--txt);
font:13px/1.4 -apple-system,"Malgun Gothic",sans-serif}
header{position:sticky;top:0;z-index:5;background:var(--bg);padding:14px 18px;
border-bottom:1px solid var(--line)}
h1{margin:0 0 10px;font-size:17px}
.meta{color:var(--mut);font-size:12px;margin-bottom:10px}
.toggles{display:flex;gap:18px;flex-wrap:wrap}
.grp{display:flex;gap:6px;align-items:center}
.grp .lbl{color:var(--mut);font-size:11px;margin-right:2px}
button.t{background:var(--panel);color:var(--mut);border:1px solid var(--line);
padding:5px 12px;border-radius:7px;cursor:pointer;font-size:12px}
button.t.on{background:#2a3140;color:#fff;border-color:#3a4250}
.matrix{display:flex;gap:10px;overflow-x:auto;padding:16px 18px}
.col{flex:0 0 258px;background:var(--panel);border:1px solid var(--line);border-radius:10px;overflow:hidden}
.col h2{margin:0;font-size:13px;padding:7px 10px;background:#1d212a;border-bottom:1px solid var(--line)}
table{width:100%;border-collapse:collapse}
td,th{padding:3px 5px;font-size:12px;border-bottom:1px solid #1f2430;white-space:nowrap}
th{color:var(--mut);font-weight:600;font-size:11px;text-align:right}
th.l,td.l{text-align:left}
td.r{text-align:right;font-variant-numeric:tabular-nums}
.rk{color:var(--mut);width:22px}
.nm{font-weight:600;display:inline-block;width:6.6em;overflow:hidden;text-overflow:clip;white-space:nowrap;vertical-align:bottom}
td.amt{font-weight:600}
.unit{color:var(--mut);font-size:11px;font-weight:400}
.net.buy{color:var(--buy)}.net.sell{color:var(--sell)}
.up{color:var(--up)}.dn{color:var(--dn)}
.sub{color:var(--mut);font-size:10px}
.rs{display:inline-block;font-size:9px;padding:0 4px;border-radius:4px;background:#243; color:#7fdca0;margin-left:4px}
.empty{padding:20px;text-align:center;color:var(--mut)}
.viewtabs{margin-bottom:10px}
.vt{background:none;border:none;color:var(--mut);font-size:16px;font-weight:700;cursor:pointer;padding:2px 0;margin-right:20px}
.vt.on{color:var(--txt);border-bottom:2px solid #4a90e2}
.rstbl-wrap{padding:14px 18px;overflow-x:auto}
.rstbl{width:100%;min-width:940px;border-collapse:collapse}
.rstbl th,.rstbl td{padding:4px 9px;font-size:12px;border-bottom:1px solid #1f2430;white-space:nowrap;text-align:right}
.rstbl th{position:sticky;top:0;background:#1d212a;color:var(--mut);font-size:11px;font-weight:600;z-index:1}
.rstbl th.l,.rstbl td.l{text-align:left}
.rstbl tbody tr:hover td{background:#1b1f27}
.scr{color:#ff8f5b;font-weight:600}
.idnr4{display:inline-block;font-size:10px;padding:0 5px;border-radius:4px;background:#3a2d10;color:#e0b341}
</style></head><body>

function fmtMcap(eok){ return eok>=10000 ? (eok/10000).toFixed(1)+"조" : eok.toLocaleString()+"억"; }

function setView(v){
  view = v;
  document.querySelectorAll(".vt").forEach(b=>b.classList.toggle("on", b.dataset.view===v));
  document.getElementById("sugup-toggles").style.display = v==="sugup"?"flex":"none";
  document.getElementById("rs-toggles").style.display    = v==="rs"?"flex":"none";
  document.getElementById("matrix").style.display = v==="sugup"?"flex":"none";
  document.getElementById("rsview").style.display = v==="rs"?"block":"none";
  render();
}

function render(){ return view==="rs" ? renderRS() : renderSugup(); }

    else{
      h += `<table><tr><th class="rk"></th><th class="l">종목</th>`
         + `<th>${sel.crit==="MCAP"?"시총대비":"순매수"}</th><th>등락</th></tr>`;
      rows.forEach(r=>{
        const main = sel.crit==="MCAP" ? fmtPct(r.ratio) : (r.net_eok>=0?"+":"")+r.net_eok.toLocaleString();
        const ud = r.ud_rt;
        h += `<tr>`
          + `<td class="rk">${r.rank}</td>`
          + `<td class="l"><span class="nm">${r.itm_nm}</span>`
          + `<br><span class="sub">${r.mcap_rank?("#"+r.mcap_rank):""} · ${fmtMcap(r.mcap_eok)}</span>`
          + (r.rs_rank&&r.rs_rank<=300?`<span class="rs">${r.rs_rank}</span>`:``)
          + `</td>`
          + `<td class="r amt net ${sel.dir==="BUY"?"buy":"sell"}">${main}`
          + (sel.crit==="MCAP"?`<br><span class="sub">${(r.net_eok>=0?"+":"")+r.net_eok.toLocaleString()}</span>`:``)+`</td>`
          + `<td class="r ${ud>=0?"up":"dn"}">${fmtPct(ud)}</td>`
          + `</tr>`;
      });
      h += `</table>`;
    }
    col.innerHTML=h; m.appendChild(col);
  });
}

function renderRS(){
  document.querySelectorAll("#rs-toggles button.t").forEach(b=>b.classList.toggle("on", sel[b.dataset.k]===b.dataset.v));
  const rows = (RSDATA.modes&&RSDATA.modes[sel.rsmode])||[];
  const label = {LNG:"장기점수순", SHRT:"단기점수순", IDNR4:"ID·NR4"}[sel.rsmode];
  const exc = RSDATA.excluded ? `  ·  액면병합·감자 ${RSDATA.excluded}종목 제외` : "";
  document.getElementById("meta").innerHTML =
    `RS 기준일 ${RSDATA.rs_date||"-"}  ·  장기점수>80 &amp; 단기점수>80  ·  <b style="color:#e6e9ef">${label}</b>  ·  ${rows.length}종목${exc}`;
  const v = document.getElementById("rsview");
  if(!rows.length){ v.innerHTML='<div class="empty">데이터 없음</div>'; return; }
  let h = `<table class="rstbl"><thead><tr>`
    + `<th>#</th><th class="l">종목</th><th class="l">섹터</th>`
    + `<th>장기점수</th><th>단기점수</th><th>장기순위</th><th>단기순위</th>`
    + `<th>MMT</th><th>ID/NR4</th><th>종가</th><th>등락</th>`
    + `<th>52주저대비</th><th>52주고대비</th><th>시총</th></tr></thead><tbody>`;
  rows.forEach((r,i)=>{
    h += `<tr>`
      + `<td>${i+1}</td>`
      + `<td class="l"><b>${r.itm_nm}</b> <span class="sub">${r.market}</span></td>`
      + `<td class="l"><span class="sub">${r.sector||""}</span></td>`
      + `<td class="scr">${r.lng_scre??"-"}</td>`
      + `<td class="scr">${r.shrt_scre??"-"}</td>`
      + `<td>${r.lng_rnk??"-"}</td>`
      + `<td>${r.shrt_rnk??"-"}</td>`
      + `<td>${r.mmt??"-"}</td>`
      + `<td>${r.id_nr4?`<span class="idnr4">${r.id_nr4}</span>`:"-"}</td>`
      + `<td>${r.eprc?r.eprc.toLocaleString():"-"}</td>`
      + `<td class="${r.ud_rt>=0?"up":"dn"}">${fmtPct(r.ud_rt)||"-"}</td>`
      + `<td class="up">${fmtPct(r.lprc_rt)||"-"}</td>`
      + `<td class="dn">${fmtPct(r.hprc_rt)||"-"}</td>`
      + `<td>${r.mcap_eok!=null?fmtMcap(r.mcap_eok):"-"}</td>`
      + `</tr>`;
  });
  h += `</tbody></table>`;
  v.innerHTML = h;
}

document.querySelectorAll("button.t").forEach(b=>b.addEventListener("click",()=>{
  sel[b.dataset.k]=b.dataset.v; render();
}));
render();
</script></body></html>
