          + `<br><span class="sub">시총 ${r.mcap_rank?("#"+r.mcap_rank):""} · ${r.mcap_eok.toLocaleString()}억</span></td>`
          + `<td class="r net ${sel.dir==="BUY"?"buy":"sell"}">${main}`
          + (sel.crit==="MCAP"?`<br><span class="sub">${(r.net_eok>=0?"+":"")+r.net_eok.toLocaleString()}억</span>`:``)+`</td>`
          + `<td class="r ${ud>=0?"up":"dn"}">${fmtPct(ud)}</td>`
          + `</tr>`;
      });
      h += `</table>`;
    }
    col.innerHTML=h; m.appendChild(col);
  });
}
document.querySelectorAll("button.t").forEach(b=>b.addEventListener("click",()=>{
  sel[b.dataset.k]=b.dataset.v; render();
}));
render();
</script></body></html>
