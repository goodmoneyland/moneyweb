<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>국장테마 2026.05.22</title>
<style>
:root {
  --bg:#070d1a; --card:#0f1829; --card2:#162033; --border:#1e2d47;
  --text:#e2e8f0; --muted:#64748b;
}
* { box-sizing:border-box; margin:0; padding:0; }
body { background:var(--bg); color:var(--text); font-family:'Noto Sans KR','Apple SD Gothic Neo',sans-serif;
       min-height:100vh; padding-bottom:40px; }
::-webkit-scrollbar { width:5px; }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:4px; }

/* 헤더 */
.page-header { background:var(--card); border-bottom:1px solid var(--border);
               padding:14px 24px; display:flex; align-items:center; gap:14px;
               position:sticky; top:0; z-index:100; }
.page-title { font-size:20px; font-weight:900;
              background:linear-gradient(90deg,#38bdf8,#a78bfa,#f59e0b);
              -webkit-background-clip:text; -webkit-text-fill-color:transparent; white-space:nowrap; }
.page-date { font-size:14px; color:var(--muted); font-weight:600; }
.update-badge { position:fixed; top:12px; right:18px; z-index:200; font-size:11px;
                color:#fbbf24; background:#1e3a8a; padding:4px 12px; border-radius:8px;
                font-weight:600; pointer-events:none; border:1px solid rgba(251,191,36,0.4); }

/* 네비 앵커 */
.nav-bar { display:flex; gap:8px; padding:14px 24px 0; flex-wrap:wrap; }
.nav-btn { padding:5px 14px; border-radius:8px; font-size:12px; font-weight:700;
           border:1px solid var(--border); color:var(--muted); cursor:pointer;
           text-decoration:none; transition:all .15s; }
.nav-btn:hover { background:var(--card2); color:var(--text); }
.nav-btn.am { border-color:#38bdf8; color:#38bdf8; }
.nav-btn.pm { border-color:#a78bfa; color:#a78bfa; }
.nav-btn.close { border-color:#f59e0b; color:#f59e0b; }

/* 섹션 카드 */
.section-card { background:var(--card); border:1px solid var(--border); border-radius:12px;
                margin:16px 24px; overflow:hidden; }
.sec-header { display:flex; align-items:center; gap:12px; padding:14px 18px;
              background:var(--card2); }
.sec-title { font-size:15px; font-weight:800; letter-spacing:0.5px; }
.time-badge { font-size:11px; color:var(--muted); background:rgba(255,255,255,0.06);
              padding:2px 8px; border-radius:6px; }
.sec-empty { font-size:13px; color:var(--muted); }

/* 강세/약세 테마 그리드 */
.theme-grid { display:grid; grid-template-columns:1fr 1fr; gap:0;
              border-bottom:1px solid var(--border); }
.theme-col { padding:14px 18px; }
.theme-col:first-child { border-right:1px solid var(--border); }
.theme-col-label { font-size:12px; font-weight:800; letter-spacing:1px; margin-bottom:10px; }
.pills-wrap { display:flex; flex-wrap:wrap; gap:0; }

/* 특징 테마 카드 */
.feat-section { padding:14px 18px; border-bottom:1px solid var(--border); }
.feat-section-title { font-size:12px; font-weight:800; color:var(--muted);
                      letter-spacing:1.5px; margin-bottom:10px; }
.feat-card { background:var(--card2); border:1px solid var(--border); border-radius:8px;
             padding:12px 14px; margin-bottom:8px; }
.feat-nm { font-size:17px; font-weight:800; color:#e2e8f0; margin-bottom:5px;
           display:flex; align-items:center; flex-wrap:wrap; }
.feat-tit { font-size:17px; color:#94a3b8; line-height:1.5; margin-bottom:4px; }
.feat-cn { font-size:19px; color:#cbd5e1; line-height:1.6; margin-top:6px;
           border-top:1px solid var(--border); padding-top:8px; }

/* 특징주 */
.stock-section { padding:14px 18px; }
.mkt-label { font-size:12px; font-weight:800; color:var(--muted);
             letter-spacing:1.5px; margin-bottom:8px; }
.stk-row { display:flex; gap:10px; align-items:flex-start; padding:6px 0;
           border-bottom:1px solid rgba(30,45,71,0.5); }
.stk-nm { font-size:26px; font-weight:700; color:#38bdf8; white-space:nowrap;
          min-width:140px; }
.stk-tit { font-size:26px; color:#94a3b8; line-height:1.4; flex:1; }

/* 데일리(장마감) */
.daily-grid { display:grid; grid-template-columns:1fr 1fr; gap:0; }
.daily-grid > div:first-child { border-right:1px solid var(--border); }
.daily-col-label { font-size:12px; font-weight:800; letter-spacing:1.5px;
                   padding:12px 16px 8px; border-bottom:1px solid var(--border); }
.daily-row { padding:12px 16px; border-bottom:1px solid rgba(30,45,71,0.5); }
.daily-header { display:flex; align-items:center; flex-wrap:wrap; margin-bottom:5px; }
.daily-stocks { display:flex; flex-wrap:wrap; gap:0; margin:5px 0; }
.daily-reason { font-size:12px; color:#64748b; line-height:1.5; margin-top:5px; }

@media (max-width:700px) {
  .theme-grid, .daily-grid { grid-template-columns:1fr; }
  .theme-col:first-child { border-right:none; border-bottom:1px solid var(--border); }
  .daily-grid > div:first-child { border-right:none; border-bottom:1px solid var(--border); }
}
</style>
</head>
<body>

<div class="page-header">
  <span class="page-title">국장테마</span>
  <span class="page-date">2026.05.22 (금)</span>
</div>
<div class="update-badge">업데이트: 2026-05-22 08:33</div>

<div class="nav-bar">
  <a href="#sec-am" class="nav-btn am">🌅 오전</a>
  <a href="#sec-pm" class="nav-btn pm">🌇 오후</a>
  <a href="#sec-close" class="nav-btn close">🏁 장마감후</a>
</div>


<div class="section-card" id="sec-am">
  <div class="sec-header" style="border-left:4px solid #38bdf8;">
    <span class="sec-title" style="color:#38bdf8;">오전 (11:50) 테마</span>
    <span class="sec-empty">아직 수집 전입니다</span>
  </div>
</div>

<div class="section-card" id="sec-pm">
  <div class="sec-header" style="border-left:4px solid #a78bfa;">
    <span class="sec-title" style="color:#a78bfa;">오후 (14:50) 테마</span>
    <span class="sec-empty">아직 수집 전입니다</span>
  </div>
</div>

<div class="section-card" id="sec-close">
  <div class="sec-header" style="border-left:4px solid #f59e0b;">
    <span class="sec-title" style="color:#f59e0b;">장마감 후 테마</span>
    <span class="sec-empty">아직 수집 전입니다 (17:30 이후 업데이트)</span>
  </div>
</div>

</body>
</html>
