const cls = v => v==null?'flat_c':(v>0?'up_c':(v<0?'down_c':'flat_c'));

// 거래대금 최대값(상·하위 전체) → 면적 비례 동그라미 크기
const MAXAMT = Math.max(1, ...UP.concat(DOWN).map(n => n.amt||0));
function bubble(n){
  const d = 14 + (Math.sqrt(Math.max(0, n.amt||0)) / Math.sqrt(MAXAMT)) * 28; // 지름 14~42px (면적∝거래대금)
  const t = Math.min(1, Math.abs(n.chg||0) / 8);   // 등락 강도 0~1 (±8% 만점)
  const L = 70 - t * 30;                            // 밝기 70%(약)→40%(강)
  const hue = (n.chg||0) >= 0 ? 4 : 212;            // 상승=빨강 / 하락=파랑

       + ` style="width:${d.toFixed(1)}px;height:${d.toFixed(1)}px;background:hsl(${hue},85%,${L}%)"></span>`;
}
function card(n){

  const top5 = all.slice(0, 5);

          + `<span class="cnm">${s.nm}</span><span class="crt ${cls(s.chg)}">${fmtS(s.chg)}</span></span>`;
  }
  // 토글: 관련종목 전체 + 편입사유(왜 이 테마에 엮였는지)
  let allHtml = '';
  for(const s of all){

            + (s.reason ? `<div class="rs">${s.reason}</div>` : '')
            + `</div>`;
  }
  return `<div class="card"><div class="hd">`

}

}
