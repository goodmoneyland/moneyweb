": "에스오에스랩", "chg": -0.29, "sctr": "기술성장기업부", "reason": "테마 편입 사유 에스오에스랩 레이저를 이용하여 주변 환경의 거리와 형태를 측정할 수 있는 센서인 라이다(LiDAR)의 개발, 제조 및 솔루션 기업으로, 자동차, 로봇, 스마트인프라 등 다양한 산업에 라이다 제품 및 관련 솔루션을 공급하는 사업을 영위. 주요 제품군은 크게 3D 고정형 라이다인 ML과 2D 라이다 GL, 그리고 라이다 데이터를 분석하여 고객 맞춤형으로 제공하는 Data &amp; Solution 등으로 구분."}, {"cd": "424960", "nm": "스마트레이더시스템", "chg": -0.43, "sctr": "기술성장기업부", "reason": "테마 편입 사유 스마트레이더시스템 레이다 전문업체. 자체 개발한 4D 이미징레이다 기술을 바탕으로 모빌리티 레이다와 비모빌리티 레이다를 전문적으로 개발. 모빌리티 분야에서 운전자 보조 및 자율주행용 레이다(Level 3 이상 전방 및 측방 레이다) 등을 개발."}, {"cd": "331740", "nm": "아우토크립트", "chg": -0.52, "sctr": "기술성장기업부", "reason": "테마 편입 사유 아우토크립트 자동차 사이버보안 소프트웨어 솔루션 업체. 자율주행에 필수적인 차량 보안 소프트웨어는 물론 협력자율주행에 요구되는 V2X(Vehicle-to-Everything) 보안 인증까지 수행."}, {"cd": "204320", "nm": "HL만도", "chg": 0.0, "sctr": "자동차부품", "reason": "테마 편입 사유 HL만도 자동주차시스템(SPAS), 자동브레이크시스템(AEB), 차간거리유지시스템(SCC), 측후방사각지대 감시/경고시스템(BSD) 등 전장부품을 개발/생산. 21년9월 자율주행(ADAS) 사업부문, 모빌리티(Mobility) 사업부문 중 무인순찰, 무인전기차충전, 플랫폼(Cloud server) 부분을 분할하여 분할 신설회사 만도모빌리티솔루션즈를 설립했으며, 종속회사 에이치엘클레무브(구, 만도헬라일렉트로닉스)에 흡수합병됨.", "live": true}, {"cd": "005380", "nm": "현대차", "chg": 0.0, "sctr": "자동차", "reason": "테마 편입 사유 현대차 현대자동차 그룹의 국내 대표 자동차 제조 및 판매 업체. 차로 추종 보조(LFA), 원격 스마트 주차보조(RSPA) 등 자율주행과 관련된 선행특허 확보 및 일부 모델에 적용.", "live": true}, {"cd": "352910", "nm": "오비고", "chg": -0.94, "sctr": "기술성장기업부", "reason": "테마 편입 사유 오비고 스마트카 소프트웨어 플랫폼 개발 및 판매 업체. 모빌리티 패러다임 변화에 따른 자율주행, 스마트카, 인포테인먼트 등의 도입으로 동사의 차량용 미드웨어 S/W는 구조적 성장을 지속할 것으로 전망되고 있음. 21년10월 자체 개발한 자율주행 통합 관제시스템이 적용된 자율주행 수소전기버스를 2021 탄소중립 EXPO에 출품."}, {"cd": "053700", "nm": "삼보모터스", "chg": -1.11, "sctr": "우량기업부", "reason": "테마 편입 사유 삼보모터스 자회사 프라코가 스마트크루즈컨트롤(SCC) 커버 개발에 성공해 현대차 제네시스 &#x27;EQ900&#x27;과 &#x27;i30 유럽형&#x27;에 공급. ADAS(첨단운전자보조시스템) 관련 부품 등도 개발 중."}, {"cd": "005930", "nm": "삼성전자", "chg": 0.0, "sctr": "반도체와반도체장비", "reason": "테마 편입 사유 삼성전자 신사업으로 자율주행차 관련 사업 추진. 자율주행차량용 반도체 개발 진행중. 이탈리아 피아트크라이슬러 오토모티브(FCA)의 부품 계열사 마그네티 마렐리 인수 추진. 삼성벤처투자를 통해 美 델파이와 자율주행차 핵심부품 개발업체 쿼너지에 공동투자. 자동차 전장부품업체인 미국의 하만인터내셔널 인수.", "li : "098460", "nm": "고영", "chg": 10.5, "sctr": "우량기업부", "reason": "테마 편입 사유 고영 3D 측정 기반 검사장비 및 솔루션 제공업체. 주요 제품으로는 3D 납도포 검사장비(SPI), 3D 자동 광학 검사장비(AOI), 3D 반도체후공정 패키징 검사장비(Meister, Zenstar 등) 등이 있으며, 전자 제조 서비스(EMS) 업체, 자동차 부품 제조업체, 반도체 패키지 및 기판 제조사 등에 공급. 3D SPI와 3D AOI 장비는 현재 SMT 공정에서의 업계 표준으로 자리매김하고 있으며, 시장 점유율 1위를 유지."}, {"cd": "464500", "nm": "아이언디바이스", "chg": 8.56, "sctr": "기술성장기업부", "reason": "테마 편입 사유 아이언디바이스 팹리스 반도체 업체. 혼성신호 SoC(System-on-Chip) 반도체 기획/설계 및 제조/판매를 주 사업으로 영위. Rx라고 불리는 DAC과 구동부의 기술뿐 아니라, Tx라고 불리는 ADC와 센싱부의 기술까지 보유. 대표 제품으로는 양산단계인 스마트파워앰프, 오디오햅틱드라이버, 디스플레이사운드앰프 등이 있으며, 중장기적으로 준비하고 있는 화합물반도체용 구동IC 제품도 기술개발이 진행되어 사업화 초기단계에 있음."}, {"cd": "226590", "nm": "엠디바이스", "chg": 8.29, "sctr": "기술성장기업부", "reason": "테마 편입 사유 엠디바이스 SSD 전문업체. 메모리 반도체(DRAM, NAND)와 시스템 반도체(SSD Controller)가 결합된 SSD(Solid State Drive)를 설계-제조-조립·검사-판매·유통의 전과정을 직접 수행하며 기업용 SSD, 소비자용 SSD, BGA(Ball Grid Array) SSD 등 SSD 관련 모든 사업을 영위."}, {"cd": "042700", "nm": "한미반도체", "chg": 0.0, "sctr": "반도체와반도체장비", "reason": "테마 편입 사유 한미반도체 반도체 제조용 장비 제조/판매 업체. 반도체 제조용 장비를 국내외 반도체 관련 제조업체에 공급중. 반도체 후공정 장비업체로 시스템 반도체 투자 확대에 따른 수혜.", "live": true}, {"cd": "200710", "nm": "에이디테크놀로지", "chg": 0.0, "sctr": "중견기업부", "reason": "테마 편입 사유 에이디테크놀로지 주문형 반도체, Application-specific integrated circuit(ASIC)를 설계 및 판매하는 디자인 하우스 사업을 주요 사업으로 영위하는 업체. 다양한 IT 제품의 핵심부품인 시스템반도체를 고객과 함께 개발하는 디자인 하우스 전문기업으로 고사양/고집적도 시스템 반도체를 개발 및 양산중이며, 저전력 시스템반도체 개발을 위한 인프라를 확보하고 있음. 초기 TSMC의 가치사슬협력자(VCA)로 시작해 글로벌 시장에서의 입지를 강화해왔으며, 20년에는 삼성 파운드리의 공식 DSP(Design Solution Partner)로 전환.", "live": true}, {"cd": "033170", "nm": "시그네틱스", "chg": 7.43, "sctr": "중견기업부", "reason": "테마 편입 사유 시그네틱스 영풍그룹의 계열의 반도체 패키징(테스트포함) 전문 업체. 독자개발 및 특허를 취득한 STBGA (signetics tape ball grid array) 양산체제를 구축. 또한, CSP 계열인 FBGA 제품과 eMCP제품 등을 수주하고, 첨단 신규 PKG 제품인 FLIPCHIP LINE을 증설하여 가동중. 신규 패키지 기술인 flip chip 패키징을 개발함으로서, 향후 매출증가의 기반을 마련. 주요 거래처는 삼성전자, LG전자 등."}, {"cd": "172670", "nm": "에이엘티", "chg": 7.35, "sctr": "벤처기업부", "reason": "테마 편입 사유 에이엘티 비메모리 반도체 후공정의 테스트 전문업체. 웨이퍼 테스트 및 패키징 테스트 모두를 수행하고 있으며, 주요 테스트 제품군은 DDI(Display Driver IC), CIS(CMOS Image Sensor), PMIC(Power Management IC), MCU(Micro Controller Unit), M/C(Memory Controller)의 테스트, CIS(CMOS Image Senser)의 Wafer Test 후 선별된 양품 Chip의 성능별 구분 및 재배열하는 Reconstruct를 진행. SoC(System on Chip)로의 테스트 품목 확대와 차세대 전력반도체의 재료인 SiC(Silicon carbide)의 Dicing 기술 개발도 진행중."}, {"cd": "058470", "nm": "리노공업", "chg": 0.0, "sctr": "우량기업부", "reason": "테마 편입 사유 리노공업 검사용 PROBE(SPRING CONTACT PROBE:LEENO PIN)와 반도체 검사용 소켓(IC TEST SOCKET)을 자체브랜드로 개발하여, 제조 판매하는 사업을 영위하는 업체. 다품종 소량의 비메모리 반도체 칩에 대응할 수 있는 IC TEST SOCKET의 수요가 증가중.", "live": true}, {"cd": "399720", "nm": "가온칩스", "chg": 0.0, "sctr": "우량기업부", "reason": "테마 편입 사유 가온칩스 시스템 반도체 전문 디자인 솔루션 업체. 삼성 파운드리의 공식 디자인 솔루션 파트너(SAFE-DSP)로, 삼성 파운드리 공정을 사용하여 시스템 반도체를 설계하고자 하는 팹리스(Fabless) 고객사에 시스템 반도체 디자인 솔루션을 제공하고, 그 솔루션을 바탕으로 개발된 웨이퍼 형태의 반도체 칩(Chip)을 삼성 파운드리에 위탁 생산하여 팹리스(Fabless) 고객사에 공급.", "live": true}, {"cd": "220260", "nm": "켐트로스", "chg": 6.54, "sctr": "우량기업부", "reason": "테마 편입 사유 켐트로스 종합 화학소재 전문기업으로, 첨단&amp;반도체소재 사업부문, 융합소재 사업부문으로 구성. 주요 사업으로 디스플레이 공정소재, 의약품 및 반도체 공정소재 등의 제조 및 판매를 영위하고 있으며, 반도체 공정에서 웨이퍼에 회로 패턴을 형성하는 소재인 포토레지스트의 공정 핵심 소재를 생산중."}, {"cd": "004710", "nm": "한솔테크닉스", "chg": 6.46, "sctr": "전자장비와기기", "reason": "테마 편입 사유 한솔테크닉스 26년4월 비메모리 시스템반도체 검사장치 설계/제조 업체 윌테크놀러지 주식을 신규 양수키로 결정(양수후지분비율:83.37%)."}, {"cd": "234030", "nm": "싸이닉솔루션", "chg": 6.44, "sctr": "중견기업부", "reason": "테마 편입 사유 싸이닉솔루션 시스템 반도체 디자인 서비스 및 파운드리 서비스 업체. SK하이닉스시스템아이씨(SK hynix System IC)의 공식 파운드리(Foundry) 판매대행 협력사이자 디자인 솔루션 파트너(Design Solution Partner)로서, SK하이닉스시스템아이씨 파운드리 공정을 사용하여 시스템 반도체를 위탁 생산하고자 하는 팹리스(Fabless) 기업들에게 시스템 반도체 디자인 솔루션을 제공하고, 이를 통하여 개발된 웨이퍼 또는 칩을 팹리스 고객사에게 공급하는 사업을 영위. 이 외에도 SK키파운드리, EPISIL, AMF 등의 파운드리 파트너로 활동."}, {"cd": "089030", "nm": "테크윙", "chg": 6.08, "sctr": "중견기업부", "reason": "테마 편입 사유 테크윙 반도체 시험·검사 장비의 제조/판매 기업. 반도체 전 분야의 검사장비를 개발 및 제조하여 유수의 글로벌 반도체 고객사들에게 제품을 공급중. 주력 제품으로는 Cube Prober, Probe Station, Memory 및 SOC Test Handler 등이며, 주요 고객사는 SK하이닉스, Micron, Intel, Inf const cls = v => v==null?'flat_c':(v>0?'up_c':(v<0?'down_c':'flat_c'));
const fmt = v => v==null?'–':(v>0?'+':'')+v.toFixed(2)+'%';
const fmtS = v => v==null?'–':(v>0?'+':'')+v.toFixed(1)+'%';   // 칩용 짧은 표기
// 거래대금 최대값(상·하위 전체) → 면적 비례 동그라미 크기
const MAXAMT = Math.max(1, ...UP.concat(DOWN).map(n => n.amt||0));
function bubble(n){
  const d = 14 + (Math.sqrt(Math.max(0, n.amt||0)) / Math.sqrt(MAXAMT)) * 28; // 지름 14~42px (면적∝거래대금)
  const t = Math.min(1, Math.abs(n.chg||0) / 8);   // 등락 강도 0~1 (±8% 만점)
  const L = 70 - t * 30;                            // 밝기 70%(약)→40%(강)
  const hue = (n.chg||0) >= 0 ? 4 : 212;            // 상승=빨강 / 하락=파랑
  return `<span class="bubble" title="거래대금 ${(n.amt||0).toLocaleString()}억 · ${fmt(n.chg)}"`
       + ` style="width:${d.toFixed(1)}px;height:${d.toFixed(1)}px;background:hsl(${hue},85%,${L}%)"></span>`;
}
function card(n){
  const all = (n.stocks||[]).slice().sort((a,b)=>(b.chg??-99)-(a.chg??-99));
  const top5 = all.slice(0, 5);
  // 타이틀 밑: 가로 5종목 (종목명 + 등락률), 클릭→팝업

          + `<span class="cnm">${s.nm}</span><span class="crt ${cls(s.chg)}">${fmtS(s.chg)}</span></span>`;
  }
  // 토글: 관련종목 전체 + 편입사유(왜 이 테마에 엮였는지)
  let allHtml = '';
  for(const s of all){
    allHtml += `<div class="stk2"><div class="top" onclick="openPopup('${s.cd}')" title="${s.nm} 상세">`
            + `<span><span class="snm">${s.nm}</span><span class="ssc">${s.sctr||''}</span></span>`
            + `<span class="srt ${cls(s.chg)}">${fmt(s.chg)}</span></div>`
            + (s.reason ? `<div class="rs">${s.reason}</div>` : '')
            + `</div>`;
  }
  return `<div class="card"><div class="hd">`
       + bubble(n)
       + `<span class="nm">${n.name}</span>`
       + `<span class="cnt">${n.cnt}종목<br>▲${n.up??0} ▼${n.down??0}</span>`
       + `<span class="rt ${cls(n.chg)}">${fmt(n.chg)}</span></div>`
       + `<div class="chips">${chips}</div>`
       + `<div class="more" onclick="this.parentNode.classList.toggle('open')"><span class="arr">▸</span> 관련종목 ${n.cnt}개 전체 · 편입사유</div>`
       + `<div class="restwrap">${allHtml}</div></div>`;
}
// 종목 클릭 → 부모 SPA의 KR 종목 팝업 (iframe 내부에서만 동작, standalone은 무시)
