고압 관련 인증을 획득한 유일한 고압 수소 어닐링 장비로, 글로벌 메이저 반도체 업체의 양산 Fabrication(Fab)에서 가동중."}, {"cd": "003230", "nm": "삼양식품", "chg": 3.52, "sctr": "식품", "reason": "테마 편입 사유 삼양식품 국내 대표적인 라면 제조업체. 국내 최초의 원조라면 삼양라면을 포함한 불닭볶음면, 짜짜로니, 간짬뽕, 맛있는라면 등 면류와 짱구, 사또밥, 별뽀빠이 등의 스낵류, 소스 및 조미소재 등 다양한 식품을 생산/판매함."}, {"cd": "047810", "nm": "한국항공우주", "chg": 3.13, "sctr": "우주항공과국방", "reason": "테마 편입 사유 한국항공우주 삼성항공, 대우중공업, 현대우주항공 항공3사의 항공사업부문이 합병해 1999년 설립된 항공기 및 항공기 부품 제조업체.국내 대표 방위산업체로서 수요자인 한국정부(방위사업청)와 계약을 통해 제품(군용기)의 연구개발, 생산, 성능개량, 후속지원 등의 사업 영위. 주요 제품으로는 KT-1 기본훈련기, T-50 고등훈련기, FA-50 전투기, KUH, LAH, 송골매 무인기 등이 있으며, KF-21(한국형 전투기) 개발중. 또한, 우주사업의 일환으로 다목적실용위성(아리랑 위성), 정지궤도복합위성 등의 본체 및 핵심부분품을 설계, 제작하여 한국항공우주연구원(KARI)에 납품중."}, {"cd": "336570", "nm": "원텍", "chg": 2.91, "sctr": "기술성장기업부", "reason": "테마 편입 사유 원텍 기업인수목적회사(SPAC) 대신밸런스제8호스팩이 의료기기 업체 원텍을 흡수합병함에 따라 변경 상장. 피부, 미용 관련 레이저 및 Surgical, 초음파 의료기기를 제조, 판매. 레이저 의료기기가 전통적인 주력 제품군이며, 주요 제품으로는 고출력 피코초 엔디야그 레이저 수술기로 Picocare 등이 있음. 고주파 의료기기 주요 제품으로는 Monopolar RF 방식의 Oligio(올리지오), 고강도 집속형 초음파 의료기기는 Tightan 등을 보유. 기타 제품으로는 써지컬 분야의 제품군으로 Holinwon, 홈케어 솔루션으로 HairBeam(탈모치료용 의료기기) 등 다양한 분야별 제품군을 보유."}, {"cd": "319660", "nm": "피에스케이", "chg": 2.74, "sctr": "우량기업부", "reason": "테마 편입 사유 피에스케이 기존 피에스케이에서 반도체 전공정 장비 사업부문이 인적분할됨에 따라 재상장된 업체. 주요 제품으로 반도체 웨이퍼 가공 장비인 Dry Strip, Dry Cleaning, New Hard Mask Strip 등이 있으며, Dry Strip 장비분야 세계시장에서 시장점유율을 확고히 하는중."}, {"cd": "000660", "nm": "SK하이닉스", "chg": 2.59, "sctr": "반도체와반도체장비", "reason": "테마 편입 사유 SK하이닉스 SK그룹 계열의 세계적인 메모리 반도체 전문 제조업체. 주력 생산제품은 DRAM과 낸드플래시 및 MCP(Multi-chip Package)와 같은 메모리 반도체이며, Foundry 사업도 병행해 종합반도체 회사로 영역을 확장중. DRAM의 경우 세계 유수의 PC 관련 전자업체에 제품을 공급중이며, 낸드플래시는 Apple 등 세계적인 PC 및 스마트폰 제조업체, 메모리 모듈 업체, 그리고 휴대용 저장장치, SSD, 메모리 카드 생산 업체 등에 제품을 공급중. 25년3월 Intel社의 Non-volatile Memory Solutions Group의 옵테인 사업부를 제외한 NAND 사업 부문 전체 인수 완료."}, {"cd": "011200", "nm": "HMM", "chg": 2.56, "sctr": "해운사", "reason": "테마 편입 사유 HMM 해운업을 영위하는 국내 대표 컨테이너 선사. 컨테이너선, 벌크선(LNG/LPG선, 원유선) 등을 운영. 주요 매출처는 얼라이언스 소속선사, 현대글로비스, GS칼텍스 등."}, {"cd": "214450", "nm": "파마리서치", "chg": 2.49, "sctr": "우량기업부", "reason": "테마 편입 사유 파마리서치 재생바이오 전문업체. 조직재생에 효능을 가지고 있는 PDRN/PN 관련 제조 기술을 확보하였으며, PDRN/PN 기반 의약품, 의료기기, 화장품 등 제품을 제조. 의약품은 PDRN의약품(플라센텍스주, 리쥬비넥스주 등), 면역증강제(자닥신), 보툴리눔톡신(리엔톡스주(자회사 파마리서치바이오) 등 주로 병의원의 정형외과, 내과, 요양병원 등에서 취급. 의료기기는 안면미용용 HA필러 클레비엘과 리쥬비엘, PN제형 안면미용용 리쥬란, PN제형 무릎 관절강내주사 콘쥬란 등이 있으며, 화장품의 경우 리쥬란 브랜드를 사용하여 힐러라인, 클리닉라인, 더마힐러라인 등의 제품라인을 보유."}, {"cd": "180640", "nm": "한진칼", "chg": 2.42, "sctr": "항공사", "reason": "테마 편입 사유 한진칼 대한항공으로부터 인적분할해 신설된 지주회사. 자회사 지분에 대한 배당수익,브랜드수수료, 임대수익 등을 주 수익원으로 확보하고 있으며, 임대사업을 위한 부동산도 보유. 주요 자회사로 대한항공, 한진이 있으며, 주요 종속회사로는 칼호텔네트워크(호텔업), 정석기업(임대업), 그 외 토파스여행정보(데이터베이스 및 온라인정보 제공업), 한진트래블(일반 및 국외 여행사업) 등을 보유. 22년6월 수직계열화를 통한 시너지 추구 등을 목적으로 진에어 지분 전량을 대한항공에 양도."}, {"cd": "089860", "nm": "롯데렌탈", "chg": 2.34, "sctr": "도로와철도운송", "reason": "테마 편입 사유 롯데렌탈 롯데그룹 계열의 렌탈 전문업체. 차량렌탈 및 중고차 매매업이 중심이 되는 차량렌탈 사업과 OA사무기기, 측정계측장비, 로봇, 건설장비 등의 Biz렌탈 사업을 영위. 차량렌탈 및 중고차 매매 사업 매출이 대부분임. 롯데오토리스(자동차 시설대여업, 자동차 할부금융업), 롯데오토케어(차량정비), 그린카(차량대여(카셰어링)) 등을 종속회사로 보유."}, {"cd": "215200", "nm": "메가스터디교육", "chg": 2.1, "sctr": "우량기업부", "reason": "테마 편입 사유 메가스터디교육 기존 메가스터디에서 인적분할 돼 설립된 업체로 초/중/고교생, 대학생 및 일반성인을 대상으로 교육 컨텐츠를 제공. 초등 온라인 학습 브랜드 &#x27;엘리하이&#x27;, 중등 온라인 브랜드 &#x27;엠베스트&#x27;, 학종설계ㆍ내신관리 전문 브랜드 &#x27;피켈&#x27; 등의 브랜드 보유. 온라인에서는 오프라인 학원이나 스튜디오에서 제작된 동영상 강의를 사이트를 통하여 제공."}, {"cd": "175330", "nm": "JB금융지주", "chg": 1.96, "sctr": "은행", "reason": "테마 편입 사유 JB금융지주 JB금융그룹 지주회사. 주요 자회사로 은행업을 영위하는 전북은행과 광주은행, 여신전문금융업을 영위하는 JB우리캐피탈, 집합투자업을 영위하는 JB자산운용, 신기술사업금융업을 영위하는 JB인베스트먼트 등이 있음."}, {"cd": "241560", "nm": "두산밥캣", "chg": 1.74, "sctr": "기계", "reason": "테마 편입 사유 두산밥캣 두산그룹 계열의 북미, 유럽, 아프리카, 아시아, 라틴아메리카 지역 내 종속회사를 두고 있는 외국기업지배지주회사로서, 타회사의 주식취득을 통하여 그 회사의 실질적인 지배권을 취득하는 것을 목적으로 하는 회사. 연결기준으로 &#x27;Construction Equipment&#x27; 및 &#x27;유압기기&#x27;의 생산 및 판매 사업을 영위하고 있으며 북미, 유럽, 중동, 아프리카, 아시아, 라틴아메리카, 오세아니아 등에 광범위한 글로벌 네트워크를 보유중."}, {"cd": "009450", "nm": "경동나비엔", "chg": 1.62, "sctr": "가정용기기와용품", "reason": "테마 편입 사유 경동나비엔 경동원그 기업부", "reason": "테마 편입 사유 슈어소프트테크 Mission Critical 분야의 검증 소프트웨어를 개발, 공급하는 사업을 영위. 시험검증 자동화 솔루션을 라이선스 및 유지보수, 기간단위 구독 방식으로 자동차, 국방, 원자력 및 에너지, 철도/항공/조선/로봇 분야의 국내 선두 기업에 공급하고 있으며, 고위험 고신뢰 소프트웨어 특성상 개발자와 별도의 3자 검증이 필요한 고객들을 대상으로 자사 솔루션을 활용한 검증 서비스도 제공. 주요 제품으로는 SW시험검증 부문의 코드검증 솔루션, 시스템검증 솔루션, 모델검증 솔루션, 미래기술검증 솔루션 등이 있으며, 빅데이터/AI 부문의 AI &amp; Bigdata, AI Ops 등이 있음. 현대차가 2대주주이며 주요 고객사임."}, {"cd": "066570", "nm": "LG전자", "chg": 0.89, "sctr": "전자제품", "reason": "테마 편입 사유 LG전자 구글 등 세계적 기업들과 자율주행차 개발 프로젝트를 공동 진행중. 美 반도체업체 프리스케일社와 차세대 자율주행차용 첨단운전자지원시스템(ADAS) 핵심부품을 공동 개발하고 있음."}, {"cd": "123410", "nm": "코리아에프티", "chg": 0.33, "sctr": "우량기업부", "reason": "테마 편입 사유 코리아에프티 자동차부품 전문업체. 차세대 자율주행차 등 스마트카에 공통적으로 들어갈 수 있는 악천후 상황에서도 보행자를 감지할 수 있는 딥러닝 기반의 ADAS 소프트웨어(SW) 알고리즘 개발."}, {"cd": "118990", "nm": "모트렉스", "chg": 0.3, "sctr": "우량기업부", "reason": "테마 편입 사유 모트렉스 운전자와 차량간의 의사소통을 위한 Automotive HMI 기술을 바탕으로 IVI(In Vehicle Infotainment) 제품을 생산하여 판매 중인 자동차부품 업체. 완성차 업체로부터 업체 선정된 후 협의된 품질 프로세스에 맞추어 개발, 생산하여 PIO 또는 DIO 방식으로 장착, 글로벌 지역에 공급하고 있으며, IVI시스템은 Apple Car Play, Google Android Auto 등 스마트폰과 디스플레이를 양방향 연결하는 커넥티비티 기술 등을 공식 인증 획득하여 적용한 최첨단 제품을 생산중."}, {"cd": "013570", "nm": "디와이", "chg": 0.26, "sctr": "자동차부품", "reason": "테마 편입 사유 디와이 자회사 디와이오토, 현대차와 자율주행 레벨4에 탑재되는 &#x27;센서 클리닝 시스템&#x27;을 공동으로 독점 개발."}, {"cd": "053450", "nm": "세코닉스", "chg": 0.24, "sctr": "우량기업부", "reason": "테마 편입 사유 세코닉스 광학부품 전문기업. MEGA급 디지털 카메라, 조향연동카메라, LDWS(차선인식), LKAS(차선유지지원), FCW(전방추돌경고), 이더넷 카메라, HBA(하이빔어시스트), DSW(운전자상태인식), CMS(Camera Monitor System), PIS(Passenger Interaction System)등의 기술 개발."}, {"cd": "038950", "nm": "파인디지털", "chg": 0.17, "sctr": "중견기업부", "reason": "테마 편입 사유 파인디지털 차량용 내비게이션 및 블랙박스, 이동통신장비 등을 개발, 판매하는 업체. “파인드라이브(Fine Drive)” 브랜드로 내비게이션을 생산하고 있으며, 음성인식 등 차별화된 서비스를 선보임."}, {"cd": "009150", "nm": "삼성전기", "chg": 0.0, "sctr": "전자장비와기기", "reason": "테마 편입 사유 삼성전기 자율주행차 MLCC 생산. 전장용 MLCC 수요는 자율주행차 수요에 힘입어 초과 성장이 전망됨. 25년2월 자율주행 핵심장치 라이다용 고전압 MLCC 개발."}, {"cd": "396270", "nm": "넥스트칩", "chg": 0.0, "sctr": "벤처기 on)’에 전략투자를하고 자율주행 기술을 개발하기 위한 협력을 강화."}, {"cd": "064800", "nm": "포니링크", "chg": -2.81, "sctr": "중견기업부", "reason": "테마 편입 사유 포니링크 모빌리티사업부에서 자율주행 모빌리티 서비스 운영과 데이터분석 및 부가서비스 개발을 목표로 자율주행사업을 위한 포트폴리오를 구상중에 있음. 현재 자율주행 솔루션의 실증사업을 전개하고 있으며, 운영 데이터 기반의 안정성 검증과 서비스 최적화를 통해 완성도 높은 상용화 체계를 구축."}, {"cd": "192650", "nm": "드림텍", "chg": -3.11, "sctr": "핸드셋", "reason": "테마 편입 사유 드림텍 영상인식 기반 AI 솔루션 기업 에이아이매틱스를 종속회사로 보유. 에이아이매틱스는 AI 영상인식 카메라인 &#x27;로드스코프9&#x27;와 첨단 운전자지원 시스템(ADAS) 및 차량 관제·관리 시스템 개발."}, {"cd": "017670", "nm": "SK텔레콤", "chg": -5.39, "sctr": "무선통신서비스", "reason": "테마 편입 사유 SK텔레콤 서울대 지능형자동차IT연구센터(IVIT연구센터)와 차량통신 및 영상인식으로 자율주행 차량의 탐지거리를 확대하는 기술 공동 개발. 트럭 자율주행 스타트업 마스오토와 AI 대형트럭 자율주행 고도화 사업을 진행. &#x27;텔코 에지 인공지능(AI)&#x27; 인프라를 기반으로 한 자율주행 로봇 기술 개발중."}, {"cd": "087260", "nm": "모바일어플라이언스", "chg": -6.26, "sctr": "벤처기업부", "reason": "테마 편입 사유 모바일어플라이언스 자동차 관련 전자부품 개발업체. 내비게이션, HUD(Head Up Display), 자율주행과 관련된 안전보조장치인 ADAS(첨단운전자보조시스템), 차량용 블랙박스 등을 개발, 제조."}, {"cd": "271830", "nm": "팸텍", "chg": -12.89, "sctr": "벤처기업부", "reason": "테마 편입 사유 팸텍 자동화 장비 전문기업으로 모빌리티 자동화장비 사업 영위중. 자동차 부품 제조 단계에서 공정 간소화 및 조립 편의성을 향상 시킨 자동화장비는 고객사의 ADAS(자율주행), IVI(차량용 인포테인먼트) 등의 공정에서 각종 자동차 모듈 및 부품을 제조ㆍ검사하는 단계에 투입되어 활용. 또한 카메라, 라이다(LiDAR), 레이더(Radar) 등 자율주행에 대한 수요가 증가함에 따라 Ford, GM, Tesla, Toyota 등 글로벌 자동차 완성업체의 요구사항을 충족하는 다양한 모빌리티 솔루션을 제공할 수 있도록 기술개발에 집중. 24년10월 현대모비스 차량용 ADAS(첨단 운전자 보조 시스템) 제조 공정 관련 Inline 장비 수주 계약 체결."}], "amt": 282228.1, "volat": 3.21}, {"id": 545, "name": "온디바이스 AI", "chg": 5.09, "chg3d": -0.95, "up": 21, "down": 1, "cnt": 24, "leaders": "심텍, 네패스아크", "stocks": [{"cd": "222800", "nm": "심텍", "chg": 21.74, "sctr": "우량기업부", "reason": "테마 편입 사유 심텍 반도체 및 통신기기용 인쇄회로기판(PCB) 업체로 온디바이스 AI 시장 활성화로 고성능 프리미엄 기판 수요가 커질 것이란 전망이 시장에서 부각."}, {"cd": "330860", "nm": "네패스아크", "chg": 13.8, "sctr": "중견기업부", "reason": "테마 편입 사유 네패스아크 반도체 제조관련 테스트 업체로 On-Device AI로 인한 테스트 타임이 증가하면서 수혜를 받을 것이란 전망이 시장에서 부각."}, {"cd": "200470", "nm": "에이팩트", "chg": 11.27, "sctr": "중견기업부", "reason": "테마 편입 사유 에이팩트 온디바이스 AI 시장 개화 ", "nm": "두산테스나", "chg": 12.32, "sctr": "우량기업부", "reason": "테마 편입 사유 두산테스나 시스템반도체 테스트 전문업체. SoC(System on Chip), CIS(CMOS Image Sensor), MCU(Micro Controller Unit), Smartcard IC 반도체 테스트를 주요 사업 영역으로 영위."}, {"cd": "098460", "nm": "고영", "chg": 10.5, "sctr": "우량기업부", "reason": "테마 편입 사유 고영 3D 측정 기반 검사장비 및 솔루션 제공업체. 주요 제품으로는 3D 납도포 검사장비(SPI), 3D 자동 광학 검사장비(AOI), 3D 반도체후공정 패키징 검사장비(Meister, Zenstar 등) 등이 있으며, 전자 제조 서비스(EMS) 업체, 자동차 부품 제조업체, 반도체 패키지 및 기판 제조사 등에 공급. 3D SPI와 3D AOI 장비는 현재 SMT 공정에서의 업계 표준으로 자리매김하고 있으며, 시장 점유율 1위를 유지."}, {"cd": "464500", "nm": "아이언디바이스", "chg": 8.56, "sctr": "기술성장기업부", "reason": "테마 편입 사유 아이언디바이스 팹리스 반도체 업체. 혼성신호 SoC(System-on-Chip) 반도체 기획/설계 및 제조/판매를 주 사업으로 영위. Rx라고 불리는 DAC과 구동부의 기술뿐 아니라, Tx라고 불리는 ADC와 센싱부의 기술까지 보유. 대표 제품으로는 양산단계인 스마트파워앰프, 오디오햅틱드라이버, 디스플레이사운드앰프 등이 있으며, 중장기적으로 준비하고 있는 화합물반도체용 구동IC 제품도 기술개발이 진행되어 사업화 초기단계에 있음."}, {"cd": "226590", "nm": "엠디바이스", "chg": 8.29, "sctr": "기술성장기업부", "reason": "테마 편입 사유 엠디바이스 SSD 전문업체. 메모리 반도체(DRAM, NAND)와 시스템 반도체(SSD Controller)가 결합된 SSD(Solid State Drive)를 설계-제조-조립·검사-판매·유통의 전과정을 직접 수행하며 기업용 SSD, 소비자용 SSD, BGA(Ball Grid Array) SSD 등 SSD 관련 모든 사업을 영위."}, {"cd": "042700", "nm": "한미반도체", "chg": 7.78, "sctr": "반도체와반도체장비", "reason": "테마 편입 사유 한미반도체 반도체 제조용 장비 제조/판매 업체. 반도체 제조용 장비를 국내외 반도체 관련 제조업체에 공급중. 반도체 후공정 장비업체로 시스템 반도체 투자 확대에 따른 수혜."}, {"cd": "200710", "nm": "에이디테크놀로지", "chg": 7.78, "sctr": "중견기업부", "reason": "테마 편입 사유 에이디테크놀로지 주문형 반도체, Application-specific integrated circuit(ASIC)를 설계 및 판매하는 디자인 하우스 사업을 주요 사업으로 영위하는 업체. 다양한 IT 제품의 핵심부품인 시스템반도체를 고객과 함께 개발하는 디자인 하우스 전문기업으로 고사양/고집적도 시스템 반도체를 개발 및 양산중이며, 저전력 시스템반도체 개발을 위한 인프라를 확보하고 있음. 초기 TSMC의 가치사슬협력자(VCA)로 시작해 글로벌 시장에서의 입지를 강화해왔으며, 20년에는 삼성 파운드리의 공식 DSP(Design Solution Partner)로 전환."}, {"cd": "033170", "nm": "시그네틱스", "chg": 7.43, "sctr": "중견기업부", "reason": "테마 편입 사유 시그네틱스 영풍그룹의 계열의 반도체 패키징(테스트포함) 전문 업체. 독자개발 및 특허를 취득한 STBGA (signetics tape ball grid array) 양산체제를 구축. 또한, CSP 계열인 FBGA 제품과 eMCP제품 등을 수주하고, 첨단 신규 PKG 제품인 FLIPCHIP LINE을 증설하여 가동중. 신규 패키지 기술인 flip chip 패키징을 개발함으로서, 향후 매출증가의 기반을 마련. 주요 거래처는 삼성전자, LG전자 등."}, {"cd": "172670", "nm": "에이엘티", "chg": 7.35, "sctr": "벤처기업부", "reason": "테마 편입 사유 에이엘티 비메모리 반도체 후공정의 테스트 전문업체. 웨이퍼 테스트 및 패키징 테스트 모두를 수행하고 있으며, 주요 테스트 제품군은 DDI(Display Driver IC), CIS(CMOS Image Sensor), PMIC(Power Management IC), MCU(Micro Controller Unit), M/C(Memory Controller)의 테스트, CIS(CMOS Image Senser)의 Wafer Test 후 선별된 양품 Chip의 성능별 구분 및 재배열하는 Reconstruct를 진행. SoC(System on Chip)로의 테스트 품목 확대와 차세대 전력반도체의 재료인 SiC(Silicon carbide)의 Dicing 기술 개발도 진행중."}, {"cd": "058470", "nm": "리노공업", "chg": 7.31, "sctr": "우량기업부", "reason": "테마 편입 사유 리노공업 검사용 PROBE(SPRING CONTACT PROBE:LEENO PIN)와 반도체 검사용 소켓(IC TEST SOCKET)을 자체브랜드로 개발하여, 제조 판매하는 사업을 영위하는 업체. 다품종 소량의 비메모리 반도체 칩에 대응할 수 있는 IC TEST SOCKET의 수요가 증가중."}, {"cd": "399720", "nm": "가온칩스", "chg": 6.81, "sctr": "우량기업부", "reason": "테마 편입 사유 가온칩스 시스템 반도체 전문 디자인 솔루션 업체. 삼성 파운드리의 공식 디자인 솔루션 파트너(SAFE-DSP)로, 삼성 파운드리 공정을 사용하여 시스템 반도체를 설계하고자 하는 팹리스(Fabless) 고객사에 시스템 반도체 디자인 솔루션을 제공하고, 그 솔루션을 바탕으로 개발된 웨이퍼 형태의 반도체 칩(Chip)을 삼성 파운드리에 위탁 생산하여 팹리스(Fabless) 고객사에 공급."}, {"cd": "220260", "nm": "켐트로스", "chg": 6.54, "sctr": "우량기업부", "reason": "테마 편입 사유 켐트로스 종합 화학소재 전문기업으로, 첨단&amp;반도체소재 사업부문, 융합소재 사업부문으로 구성. 주요 사업으로 디스플레이 공정소재, 의약품 및 반도체 공정소재 등의 제조 및 판매를 영위하고 있으며, 반도체 공정에서 웨이퍼에 회로 패턴을 형성하는 소재인 포토레지스트의 공정 핵심 소재를 생산중."}, {"cd": "004710", "nm": "한솔테크닉스", "chg": 6.46, "sctr": "전자장비와기기", "reason": "테마 편입 사유 한솔테크닉스 26년4월 비메모리 시스템반도체 검사장치 설계/제조 업체 윌테크놀러지 주식을 신규 양수키로 결정(양수후지분비율:83.37%)."}, {"cd": "234030", "nm": "싸이닉솔루션", "chg": 6.44, "sctr": "중견기업부", "reason": "테마 편입 사유 싸이닉솔루션 시스템 반도체 디자인 서비스 및 파운드리 서비스 업체. SK하이닉스시스템아이씨(SK hynix System IC)의 공식 파운드리(Foundry) 판매대행 협력사이자 디자인 솔루션 파트너(Design Solution Partner)로서, SK하이닉스시스템아이씨 파운드리 공정을 사용하여 시스템 반도체를 위탁 생산하고자 하는 팹리스(Fabless) 기업들에게 시스템 반도체 디자인 솔루션을 제공하고, 이를 통하여 개발된 웨이퍼 또는 칩을 팹리스 고객사에게 공급하는 사업을 영위. 이 외에도 SK키파운드리, EPISIL, AMF 등의 파운드리 파트너로 활동."}, {"cd": "089030", "nm": "테크윙", "chg": 6.08, "sctr": "중견기업부", "reason": "테마 편입 사유 테크윙 반도체 시험·검사 장비의 제조/판매 기업. 반도체 전 분야의 검사장비를 개발 및 제조하여 유수의 글로벌 반도체 고객사들에게 제품을 공급중. 주력 제품으로는 Cube Prober, Probe Station, Memory 및 SOC Test Handler 등이며, 주요 고객사는 SK하이닉스, Micron, Intel, Infineon 등. 해외 SSD 번인공정장비 공급을 시작으로 DRAM을 비롯하여 비메모리 관련 번인공정 장비 공급으로 사업을 확대중."}, {"cd": "003160", "nm": "디아이", "chg": 5.8, "sctr": "반도체와반도체장비", "reason": "테마 편입 사유 디아이 반도체 검사장비 등 초정밀 시험장비의 제조 및 수입업을 영위하는 업체. 비메모리 반도체(시스템 반도체)에 특화된 고성능 장비로 SOC, CIS, MCU, DDI. PMIC 등 다양한 응용 디바이스의 신뢰성을 검증하는 장비인 LBT(Logic Burn-In Tester) System Series를 제조/판매중."}, {"cd": "102120", "nm": "어보브반도체", "chg": 5.03, "sctr": "벤처기업부", "reason": "테마 편입 사유 어보브반도체 비메모리 반도체 중 두뇌역할을 하는 반도체 칩인 Micro Controller Unit(MCU)를 설계/생산하는 팹리스 업체. 핵심 설계 및 외주관리를 통해 제품을 제조하고 있으며, 매출비중이 높은 기능별 제품은 가전용 MCU이며 삼성전자 등 국내외 유수한 업체에 제품을 공급. Motor, Power제어 및 BLE SoC 제품까지 사업 영역을 확대중. 주력제품인 MCU는 백색가전, TV, 모바일 및 소형 가전 등 400여 가지의 전기/전자제품에 적용중이며, Touch Sensor, Ambient Light Sensor 등의 Sensor 사업 및 각종 Driver IC를 개발 공급."}, {"cd": "452430", "nm": "사피엔반도체", "chg": 4.76, "sctr": "기술성장기업부", "reason": "테마 편입 사유 사피엔반도체 시스템반도체 설계기술을 전문적으로 수행하는 팹리스 기업으로, 차세대 평면 디스플레이 산업으로 주목받고 있는 Micro-/Mini-LED 디스플레이를 구동하는데 최적화된 디스플레이 구동 반도체(Display Driver IC) 제품을 전문적으로 연구/개발하여 전세계 시장에 공급."}, {"cd": "445090", "nm": "에이직랜드", "chg": 4.44, "sctr": "벤처기업부", "reason": "테마 편입 사유 에이직랜드 주문형반도체(ASIC)를 설계디자인하는 디자인하우스 반도체업체로 TSMC의 국내 유일 공식 협력사. TSMC 파운드리 공정을 사용하여 시스템 반도체를 위탁 생산하고자 하는 팹리스(Fabless) 기업을 주된 고객사로 하고 있으며, 고객사의 반도체 논리 회로 설계를 실제 TSMC의 파운드리를 통해 제조가 가능한 형태인 물리적 설계로 재설계해주는 디자인 솔루션의 제공을 주요 사업으로 영위."}, {"cd": "405100", "nm": "큐알티", "chg": 4.34, "sctr": "우량기업부", "reason": "테마 편입 사유 큐알티 반도체 신뢰성 평가 및 종합분석 전문기업으로 높은 테스트 난이도를 요구하는 HBM이나 온디바이스, NPU, CXL 등 신규 반도체 관련 제품들의 연구 개발 및 양산 비중 증가에 따른 수혜 기대감 부각."}, {"cd": "093640", "nm": "케이알엠", "chg": 4.23, "sctr": "중견기업부", "reason": "테마 편입 사유 케이알엠 반도체 사업부는 멀티미디어 반도체를 개발 ·판매하는 기능형 반도체 설계 전문 사업으로서 멀티미디어 분야의 핵심 기술인 SoC(System On a Chip) 설계기술을 바탕으로 AP(Application Processor) IC, Optical MP3 IC, Multimedia Interface IC, DAB(Digital Audio Broadcasting) IC 등을 설계, 제조, 판매."}, {"cd": "254
