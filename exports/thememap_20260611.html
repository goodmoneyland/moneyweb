론", "chg": 13.22, "sctr": "중견기업부", "reason": "테마 편입 사유 하나마이크론 반도체 재료(반도체식각장비의 Silicon parts 등) 업체 하나머티리얼즈를 종속회사로 보유."}, {"cd": "114810", "nm": "한솔아이원스", "chg": 13.15, "sctr": "우량기업부", "reason": "테마 편입 사유 한솔아이원스 반도체 전공정 및 디스플레이 제조 장비 부품의 정밀 가공 및 세정/코팅을 주요 사업으로 영위하는 업체. 반도체 장비 부품과 디스플레이 장비 부품의 정밀 가공을 시작으로 현재 반도체 장비 부품 초정밀 세정/코팅으로 사업 영역을 확장."}, {"cd": "078350", "nm": "한양디지텍", "chg": 13.03, "sctr": "우량기업부", "reason": "테마 편입 사유 한양디지텍 반도체 메모리모듈, SSD, 인터넷 관련기기, VoIP 장비(인터넷 전화기, VoIP 어댑터, 무선AP 등) 사업 등을 영위하는 업체. 2019년 베트남에 서버용 메모리모듈, PC용 메모리모듈 양산 체제를 구축."}, {"cd": "014680", "nm": "한솔케미칼", "chg": 12.98, "sctr": "화학", "reason": "테마 편입 사유 한솔케미칼 한솔그룹 계열의 정밀화학업체. 정밀화학 제품으로 반도체, 디스플레이 등에 사용되는 과산화수소로 주로 사용되는 BPO를 생산중. 또한, 반도체 관련 박막소재(Precursor)를 삼성전자, SK하이닉스, TSMC 등 글로벌 주요 반도체 업체들에 판매."}, {"cd": "252990", "nm": "샘씨엔에스", "chg": 12.92, "sctr": "기술성장기업부", "reason": "테마 편입 사유 샘씨엔에스 반도체 프로브카드용 세라믹STF(Space Transformer) 제작 업체. 주요 제품은 NAND 프로브카드용 세라믹 STF, DRAM 프로브카드용 세라믹 STF, 비메모리 반도체 프로브카드용 세라믹 STF 등으로, NAND 프로브카드용 세라믹 STF에서 매출 대부분이 발생. 주요 매출처는 삼성전자 등임."}, {"cd": "166090", "nm": "하나머티리얼즈", "chg": 11.51, "sctr": "우량기업부", "reason": "테마 편입 사유 하나머티리얼즈 반도체용 실리콘부품 소재 및 부품 생산업체. 반도체 생산시 사용되는 실리콘(Silicon) 및 실리콘카바이드(SiC) 소재의 일렉트로드(Electrode)와 링(Ring) 제조 및 판매를 주요 사업 영위."}, {"cd": "059090", "nm": "미코", "chg": 10.2, "sctr": "중견기업부", "reason": "테마 편입 사유 미코 반도체/디스플레이용 장비를 구성하는 부품 제작 업체. 주요 제품으로는 Heater, ESC  및 세라믹 부품 등이 있음."}, {"cd": "077360", "nm": "덕산하이메탈", "chg": 10.12, "sctr": "우량기업부", "reason": "테마 편입 사유 덕산하이메탈 반도체 패키징 재료인 솔더볼(Solder Ball) 제조/판매 사업을 영위."}, {"cd": "272110", "nm": "케이엔제이", "chg": 10.03, "sctr": "우량기업부", "reason": "테마 편입 사유 케이엔제이 CVD-SiC(탄화규소) Product 생산 업체. CVD-SiC(탄화규소) 제품인 LED제조용 SiC 코팅제품 및 반도체 웨이퍼 에칭공정용 소모품 SiC Focus Ring 등을 생산."}, {"cd": "064760", "nm": "티씨케이", "chg": 9.47, "sctr": "우량기업부", "reason": "테마 편입 사유 티씨케이 반도체, 태양전지 및 LED용 부품 전문 업체. 고순도 흑연(Graphite)을 이용한 반도체 실리콘 잉곳을 생산하는 Growing 장비용 Graphite 부품(고순도 흑연 제품)을 국내 최초로 국산화하여 제조, 판매. 반도체 Device업체에서 사용하는 장비의 Solid SiC Wafer, Ring 등을 판매 중에 있으며, SiC coating사업으로 반도체 ALD 장비에 들어가는 Susceptor류와 LED Chip 생산용 Wafer Carrier를 제조, 판매 중. Solid SiC 사업 부문 매출 비중이 높으며, 매출 대부분은 반도체에서 발생."}, {"cd": "195870", "nm": "해성디에스", "chg": 9.18, "sctr": "반도체와반도체장비", "reason": "테마 편입 사유 해성디에스 해성그룹 계열의 리드프레임 및 반도체 패키지용 Substrate 제작, 판매를 주요 사업으로 영위하는 업체. 주요 제품으로는 FBGA 및 Fc-FBGA(2Layer), ELF(Etched IC Leadframe), SLF(Stamped IC Leadframes) 등."}, {"cd": "104830", "nm": "원익머트리얼즈", "chg": 9.0, "sctr": "우량기업부", "reason": "테마 편입 사유 원익머트리얼즈 2006년 12월 구 원익IPS의 특수가스사업부문이 물적분할한 업체. 반도체 및 디스플레이 생산공정에 사용되는 특수가스 생산을 주요 사업으로 영위. 삼성전자, SK하이닉스 등의 종합반도체회사를 주요 고객사로 두고 있으며, 반도체 이외에도 삼성디스플레이 AMOLED 사업부에 공정용 특수가스를 공급중."}, {"cd": "146320", "nm": "비씨엔씨", "chg": 8.99, "sctr": "벤처기업부", "reason": "테마 편입 사유 비씨엔씨 반도체 부품 제조업체. 반도체 제조공정에 사용되는 소모성 부품 중 합성쿼츠, 천연쿼츠, 실리콘, 세라믹 등의 소재를 기반으로하는 부품을 제조. 주요 제품으로는 QD9 부품(합성쿼츠), 천연쿼츠 부품(Natural Quartz), 실리콘(Si) 부품, 알루미나 세라믹(Al2O3) 부품 등이 있으며, QD9 및 QD9+(합성쿼츠) 부품 매출 비중이 높음."}, {"cd": "036810", "nm": "에프에스티", "chg": 8.78, "sctr": "우량기업부", "reason": "테마 편입 사유 에프에스티 반도체 재료/장비 전문업체. 포토마스크용 보호막인 펠리클(Pellicle)과 반도체공정중 식각공정에서 Process Chamber 내 온도조절장비인 칠러(Chiller)를 주력으로 생산. 국내 유일의 펠리클 제조 업체이며, FPD용 펠리클(Pellicle) 사업도 영위."}, {"cd": "295310", "nm": "에이치브이엠", "chg": 8.38, "sctr": "기술성장기업부", "reason": "테마 편입 사유 에이치브이엠 첨단금속 전문 제조업체. 고순도금속, 스퍼터링 타겟, Ni계/Ti계 특수금속, 첨단금속을 제조하고 있으며, 유도 가열 진공용해(VIM), 진공 아크 재용해(VAR), 플라즈마 아크 용해(PACHM), 전자빔 용해(EBCHM) 등의 최첨단 진공용해 설비를 자체 제작하여 운영. 반도체, 전기/전자, 우주/항공/방위, 석유/화학, 에너지/발전 등의 다양한 산업군에 걸쳐 고객을 확보. 17년1월 반도체 세정가스 제조용 소재 국산화."}, {"cd": "074600", "nm": "원익QnC", "chg": 8.22, "sctr": "우량기업부", "reason": "테마 편입 사유 원익QnC 반도체 WAFER 생산시 소요되는 석영유리제품(Quartz Ware)과 반도체 및 LCD 생산시 사용되는 세라믹제품을 전문적으로 제조, 공급하는 업체."}, {"cd": "424980", "nm": "마이크로투나노", "chg": 8.11, "sctr": "기술성장기업부", "reason": "테마 편입 사유 마이크로투나노 MEMS(Micro-Electro Mechanical Systems)기술 기반 반도체용 프로브카드 개발, 제조 및 판매 업체. 반도체용 프로브카드 제품은 용도별로 낸드플래시용 프로브카드, DRAM용 프로브카드 등으로 구분하고 있으며, 이 외 파운드리 사업(Microneedle, 압력센서, V-Groove 등)도 영위."}, {"cd": "278280", "nm": "천보", "chg": 8.07, "sctr": "중견기업부", "reason": "테마 편입 사유 천보 전자소재(LCD식각액첨가제, OLED소재, 반도체공정 소재 등), 2차전지 소재(전해질, 전해액첨가제), 의약품 소재(의약품중간체), 정밀화학 소재 등을 영위하는 업체. 반도체공정소재는 반도체 제조공정에서 초미세 선폭의 패턴을 구현하는데 정확성을 제고하는 역할을 담당(수율 및 품질개선, 생산성 향상, 설비투자 절감 효과)하는 소재로서 국내 최대 점유율을 차지."}, {"cd": "102710", "nm": "이엔에프테크놀로지", "chg": 7.77, "sctr": "우량기업부", "reason": "테마 편입 사유 이엔에프테크놀로지 반도체 및 디스플레이 제조공정용 특수 화학제품 제조/판매업체. 주요 제품으로 반도체 및 디스플레이 소재인 프로세스 케미칼(식각액, 신너, 현상액, 박리액 등), 반도체 포토레지스트용 핵심원료인 화인케미칼(포토레지스트용 원료 등), 칼라페이스트, 반도체 CMP용 Slurry 등을 보유."}, {"cd": "489500", "nm": "엘케이켐", "chg": 7.58, "sctr": "벤처기업부", "reason": "테마 편입 사유 엘케이켐 반도체 소재 전문업체. 반도체 산업에서 박막 증착 공정에 사용되는 화학소재 &#x27;프리커서 및 리간드&#x27;를 전문적으로 개발하고, 제조 및 판매하고 있음. 주요 제품으로는 반도체 박막 증착 소재 중 원자층증착공정(ALD)에 사용되는 고유전율막 형성 High-k 소재, 저유전율막 형성 Low-k 소재 등."}, {"cd": "445180", "nm": "퓨릿", "chg": 7.33, "sctr": "중견기업부", "reason": "테마 편입 사유 퓨릿 한국알콜산업 계열사로 초고순도의 반도체용 및 디스플레이용, 일반 산업용 케미컬 제조업체. 반도체, 디스플레이, 일반 산업 공정에 필요한 소재 원재료를 공급하고 있으며, 주요 제품으로는 반도체급 PGME, 반도체급 PGMEA, 반도체급 EEP, 반도체급 EL, LCD급 EL, 산업용 EEP, SR-200P, SBA 등이 있음."}, {"cd": "080580", "nm": "오킨스전자", "chg": 7.32, "sctr": "벤처기업부", "reason": "테마 편입 사유 오킨스전자 반도체 검사용 소켓 제조업체. 반도체 후공정 과정에서 칩의 불량 여부를 검사하는 부품인 &quot;번인소켓(Burn-In Socket)&quot;을 주로 생산."}, {"cd": "220260", "nm": "켐트로스", "chg": 6.54, "sctr": "우량기업부", "reason": "테마 편입 사유 켐트로스 종합 화학소재 전문기업으로, 반도체 공정에서 웨이퍼에 회로 패턴을 형성하는 소재인 포토레지스트의 공정 핵심 소재를 생산중."}, {"cd": "004710", "nm": "한솔테크닉스", "chg": 6.46, "sctr": "전자장비와기기", "reason": "테마 편입 사유 한솔테크닉스 종속회사 한솔아이원스와 에스아이머트리얼즈를 통해 반도체, 디스플레이 제조 공정에 사용되는 정밀 부품 가공/세정/코팅 및 반도체 실리콘 부산물 재생 사업을 영위중."}, {"cd": "482630", "nm": "삼양엔씨켐", "chg": 6.33, "sctr": "중견기업부", "reason": "테마 편입 사유 삼양엔씨켐 반도체용 정밀화학 소재 전문업체. 반도체 제조 공정 중 노광 공정과 세정 공정에 사용되는 소재(Polymer, PAG, PERR 중간체)를 생산 및 판매하는 사업을 영위. 주요 제품은 포토레지스트(PR)용 소재(고분자(Polymer), 광산발산제(PAG))와 세정액의 원료 또는 중간체(PERR 중간체) 등임."}, {"cd": "005290", "nm": "동진쎄미켐", "chg": 6.13, "sctr": "우량기업부", "reason": "테마 편입 사유 동진쎄미켐 반도체 및 디스플레이용 재료, 대체에너지(Li-ion rechargeable batteries, fuel cells)용 재 chg": 12.76, "sctr": "벤처기업부", "reason": "테마 편입 사유 기가비스 반도체 기판 광학검사(AOI) 및 수리장비(AOR) 전문 업체. 반도체 기판의 결함 검출을 통한 품질 관리, 불량의 수리를 통한 수율 향상, 결함 데이터의 집계 및 관리를 통한 생산 공정 관리의 Total Solution을 제공하고 있으며, AOI(자동광학검사기), VRS(Verify/Repair System), AOR(Automatic Optical Repair)과 같은 단독 설비와 자동화 설비인 FA(In-Line 등), 그리고 이들 설비의 효율적인 운용을 위한 소프트웨어(DTS 등)를 제작하여 판매. 글로벌 Top-tier 반도체 기판 제조사에 고해상도 검사 및 수리 플랫폼을 제공."}, {"cd": "200470", "nm": "에이팩트", "chg": 11.27, "sctr": "중견기업부", "reason": "테마 편입 사유 에이팩트 2007년 SK하이닉스 협력업체 협의회가 공동 출자해 설립된 반도체 제조 관련 테스트 및 엔지니어링 서비스업체. 반도체 후공정 패키징 및 테스트 외주사업을 영위. 주요 매출처는 SK하이닉스, 삼성전자, 실리콘마이터스, 제주반도체, 동심반도체 등 국내, 해외 대형 IDM업체에서부터 중소형 팹리스업체까지 다양한 고객군을 확보."}, {"cd": "039440", "nm": "에스티아이", "chg": 10.54, "sctr": "우량기업부", "reason": "테마 편입 사유 에스티아이 주요 제품으로는 반도체 및 Display용 CCSS(중앙약품 공급시스템), Wet System(세정, 식각, 현상 시스템) 등."}, {"cd": "098460", "nm": "고영", "chg": 10.5, "sctr": "우량기업부", "reason": "테마 편입 사유 고영 3D 측정 기반 검사장비 및 솔루션 제공업체. 주요 제품으로는 3D 납도포 검사장비(SPI), 3D 자동 광학 검사장비(AOI), 3D 반도체후공정 패키징 검사장비(Meister, Zenstar 등) 등이 있으며, 전자 제조 서비스(EMS) 업체, 자동차 부품 제조업체, 반도체 패키지 및 기판 제조사 등에 공급. 3D SPI와 3D AOI 장비는 현재 SMT 공정에서의 업계 표준으로 자리매김하고 있으며, 시장 점유율 1위를 유지."}, {"cd": "168360", "nm": "펨트론", "chg": 10.24, "sctr": "우량기업부", "reason": "테마 편입 사유 펨트론 3D 정밀공정검사장비 제조, 판매 업체. 주요 제품으로는 SMT 검사장비(PCB제조 SMT공정 납도포 및 실장부품 3차원(3D)검사장비), 반도체 검사장비(반도체 패키징공정 Wafer 및 Wire Bonding 검사장비 ), 2차전지 검사장비(2차전지 Lead Tab In-Line 제조장비 및 검사장비) 등이 있음."}, {"cd": "092870", "nm": "엑시콘", "chg": 10.16, "sctr": "우량기업부", "reason": "테마 편입 사유 엑시콘 반도체 검사장비 제조 사업을 영위하는 업체. 15년10월 코넥스시장에서 코스닥시장으로 이전 상장. 주요 제품의 품목군은 메모리 테스트 장비(Module, Burn-in, SSD 등) 등."}, {"cd": "053610", "nm": "프로텍", "chg": 9.74, "sctr": "우량기업부", "reason": "테마 편입 사유 프로텍 고속 자동화 시스템 기반 반도체 패키지 공정장비 제조 전문기업. 핵심제품은 디스펜서, 다이본더, 무인운반차(AGV) 등이며, 반도체 제조(후공정), 표면실장 공정, LED패키징, 스마트폰 제조 등에 사용되는 장비(설비) 등이 있음."}, {"cd": "064760", "nm": "티씨케이", "chg": 9.47, "sctr": "우량기업부", "reason": "테마 편입 사유 티씨케이 반도체, 태양전지 및 LED용 부품 전문 업체. 고순도 흑연(Graphite)을 이용한 반도체 실리콘 잉곳을 생산하는 Growing 장비용 Graph        + `<span class="nm">${n.name}</span>`
       + `<span class="cnt">${n.cnt}종목<br>▲${n.up??0} ▼${n.down??0}</span>`
       + `<span class="rt ${cls(n.chg)}">${fmt(n.chg)}</span></div>`
       + `<div class="stklist">${topHtml}</div>`
       + toggle + `</div>`;
}
// 종목 클릭 → 부모 SPA의 KR 종목 팝업 (iframe 내부에서만 동작, standalone은 무시)
function openPopup(cd){
  try { if (window.parent && window.parent !== window && window.parent.openKrStock) window.parent.openKrStock(cd); }
  catch(e){}
}
document.getElementById('up').innerHTML   = UP.map((n,i)=>card(n,i+1)).join('');
document.getElementById('down').innerHTML = DOWN.map((n,i)=>card(n,i+1)).join('');
</script>
</body></html>
