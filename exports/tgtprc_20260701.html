let currentSort = 'brk_cnt';
let currentStock = null;
let chartInst = null;

function fmtNum(n) {
  if (n == null) return '-';
  return n.toLocaleString('ko-KR');
}

function fmtYM(ym) {
  return ym.substring(2,4) + '.' + ym.substring(4,6);
}

function upColor(v) {
  if (v == null) return '';
  return v > 0 ? 'up' : v < 0 ? 'dn' : '';
}

function sortList(key) {
  currentSort = key;
  document.querySelectorAll('.sort-btn').forEach(b => b.classList.toggle('active', b.getAttribute('onclick').includes("'" + key + "'")));
  renderList();
}

function filterList() {
  renderList();
}

function renderList() {
  const q = (document.getElementById('search-input').value || '').trim().toLowerCase();
  let list = STOCKS.filter(s => !q || s.itm_nm.toLowerCase().includes(q) || s.itm_cd.includes(q));
  if (currentSort === 'brk_cnt') list.sort((a, b) => b.brk_cnt - a.brk_cnt);
  else if (currentSort === 'upside') list.sort((a, b) => (b.upside ?? -999) - (a.upside ?? -999));
  else list.sort((a, b) => a.itm_nm.localeCompare(b.itm_nm, 'ko'));

  const container = document.getElementById('stock-list');
  container.innerHTML = '';
  list.forEach(s => {
    const div = document.createElement('div');
    div.className = 'stk-row' + (currentStock === s.itm_cd ? ' active' : '');
    div.setAttribute('data-cd', s.itm_cd);
    const up = s.upside != null ? s.upside.toFixed(1) : '-';
    const upCls = s.upside > 0 ? 'up' : s.upside < 0 ? 'dn' : '';
    div.innerHTML = `
      <div class="stk-nm">${s.itm_nm} <span style="font-size:10.5px;color:var(--muted);font-weight:400">${s.itm_cd}</span></div>
      <div class="stk-meta">
        <span>증권사 ${s.brk_cnt}곳</span>
        <span>목표 ${fmtNum(s.avg_tgt)}</span>
        <span class="${upCls} up-badge">${up !== '-' ? (s.upside > 0 ? '+' : '') + up + '%' : '-'}</span>
      </div>
    `;
    div.onclick = () => selectStock(s.itm_cd);
    container.appendChild(div);
  });
}

let activeView = 'chart';

function showView(v) {
  activeView = v;
  document.getElementById('chart-view').style.display = v === 'chart' ? 'block' : 'none';
  document.getElementById('table-view').style.display = v === 'table' ? 'block' : 'none';
  document.querySelectorAll('.view-tab').forEach(t => t.classList.toggle('active', t.getAttribute('data-view') === v));
}

function selectStock(itm_cd) {
  currentStock = itm_cd;
  document.querySelectorAll('.stk-row').forEach(r => r.classList.toggle('active', r.getAttribute('data-cd') === itm_cd));

  const s = STOCKS.find(x => x.itm_cd === itm_cd);
  if (!s) return;

  const upside = s.upside != null ? s.upside.toFixed(1) : '-';
  const upCls = s.upside > 0 ? 'color:var(--green)' : s.upside < 0 ? 'color:var(--red)' : '';

  // 헤더
  document.getElementById('header-content').innerHTML = `
    <div style="display:flex;align-items:baseline;gap:12px;flex-wrap:wrap;">
      <span style="font-size:20px;font-weight:900;color:var(--text)">${s.itm_nm}</span>
      <span style="font-size:13px;color:var(--muted)">${s.itm_cd}</span>
      ${s.cur_prc ? `<span style="font-size:15px;font-weight:700">${fmtNum(s.cur_prc)}원</span>` : ''}
    </div>
  `;

  // 요약 카드
  const cards = document.getElementById('stat-cards');
  cards.style.display = 'grid';
  cards.style.gridTemplateColumns = 'repeat(3, 1fr)';
  cards.style.gap = '12px';
  cards.innerHTML = `
    <div class="stat-card">
      <div class="stat-label">목표주가 (평균)</div>
      <div class="stat-val">${fmtNum(s.avg_tgt)}원</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">목표주가 수익률</div>
      <div class="stat-val" style="${upCls}">${upside !== '-' ? (s.upside > 0 ? '+' : '') + upside + '%' : '-'}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">커버 증권사 수</div>
      <div class="stat-val">${s.brk_cnt}곳</div>
    </div>
  `;

  // 탭
  const tabs = document.getElementById('view-tabs');
  tabs.style.display = 'flex';
  tabs.innerHTML = `
    <div class="view-tab ${activeView==='chart'?'active':''}" data-view="chart" onclick="showView('chart')">차트</div>
    <div class="view-tab ${activeView==='table'?'active':''}" data-view="table" onclick="showView('table')">테이블</div>
  `;

  // 차트/테이블 영역 먼저 표시
  document.getElementById('chart-view').style.display = activeView === 'chart' ? 'block' : 'none';
  document.getElementById('table-view').style.display = activeView === 'table' ? 'block' : 'none';

  const rows = (MONTHLY[itm_cd] || []).slice().sort((a, b) => a.ym.localeCompare(b.ym));

  const labels = rows.map(r => fmtYM(r.ym));
  const avgData = rows.map(r => r.avg_tgt);
  const minData = rows.map(r => r.min_tgt);
  const maxData = rows.map(r => r.max_tgt);
  const priceData = rows.map(r => r.price || null);

  if (chartInst) { chartInst.destroy(); chartInst = null; }
  const ctx = document.getElementById('tgt-chart').getContext('2d');
  chartInst = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [
        {
          label: '목표주가(평균)',
          data: avgData,
          borderColor: '#10b981',
          backgroundColor: 'transparent',
          borderWidth: 2.5,
          pointRadius: 3,
          tension: 0.3,
        },
        {
          label: '목표주가(최저)',
          data: minData,
          borderColor: '#3b82f6',
          backgroundColor: 'transparent',
          borderWidth: 1.5,
          borderDash: [5, 3],
          pointRadius: 2,
          tension: 0.3,
        },
        {
          label: '목표주가(최고)',
          data: maxData,
          borderColor: '#f472b6',
          backgroundColor: 'transparent',
          borderWidth: 1.5,
          borderDash: [5, 3],
          pointRadius: 2,
          tension: 0.3,
        },
        {
          label: '주가',
          data: priceData,
          borderColor: '#94a3b8',
          backgroundColor: 'transparent',
          borderWidth: 2,
          pointRadius: 3,
          tension: 0.3,
        },
      ]
    },
    options: {
      responsive: true,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: {
          labels: { color: '#94a3b8', font: { size: 11 }, boxWidth: 20 }
        },
        tooltip: {
          backgroundColor: '#0f1829',
          borderColor: '#1e2d47',
          borderWidth: 1,
          titleColor: '#e2e8f0',
          bodyColor: '#94a3b8',
          callbacks: {
            label: ctx => ` ${ctx.dataset.label}: ${ctx.raw?.toLocaleString('ko-KR')}원`
          }
        }
      },
      scales: {
        x: {
          ticks: { color: '#64748b', font: { size: 11 } },
          grid: { color: '#1e2d47' }
        },
        y: {
          ticks: {
            color: '#64748b',
            font: { size: 11 },
            callback: v => v?.toLocaleString('ko-KR')
          },
          grid: { color: '#1e2d47' }
        }
      }
    }
  });

  // 테이블
  const tbody = document.getElementById('table-body');
  const desc = rows.slice().reverse();
  tbody.innerHTML = desc.map(r => {
    const upCls2 = r.upside > 0 ? 'up' : r.upside < 0 ? 'dn' : '';
    const upStr = r.upside != null ? (r.upside > 0 ? '+' : '') + r.upside.toFixed(1) + '%' : '-';
    return `<tr>
      <td>${r.ym.substring(0,4)}.${r.ym.substring(4,6)}.말</td>
      <td>${fmtNum(r.price)}</td>
      <td>${fmtNum(r.avg_tgt)}</td>
      <td>${fmtNum(r.min_tgt)}</td>
      <td>${fmtNum(r.max_tgt)}</td>
      <td>${r.brk_cnt}</td>
      <td class="${upCls2}">${upStr}</td>
    </tr>`;
  }).join('');
}

// 초기화
renderList();

// 첫 번째 종목 자동 선택
if (STOCKS.length > 0) selectStock(STOCKS[0].itm_cd);
</script>
