    t._up  = vs.filter(v=>v>0).length;
    t._down= vs.filter(v=>v<0).length; } }
const byChgS=(a,b)=>((sVal(b))??-99)-((sVal(a))??-99);   // 종목 정렬(세션값)
const byChgT=(a,b)=>((tChg(b))??-99)-((tChg(a))??-99);   // 테마 정렬(세션값)

/* ── 선택: 차트 + 관련종목 ── */
let curTheme=null, curMode='chg';
function selectTheme(t){ if(!t) return; curTheme=t; selNo=t.no; renderChart(); renderRel(); highlight(); markCard(); }
function selectByNo(no){ selectTheme(themeByNo(no)); }
function setMode(m){ curMode=m; renderChart(); }
function renderChart(){
  const t=curTheme; if(!t) return;
  document.getElementById('chead').innerHTML =
     `<span class="cn">${t.name}</span><span class="cm">60일 누적등락률</span>`
    +`<span class="ctoggle">`
    +`<button class="${curMode==='chg'?'on':''}" onclick="setMode('chg')">오늘 강한 5</button>`
    +`<button class="${curMode==='cap'?'on':''}" onclick="setMode('cap')">시총 큰 5</button></span>`;
  drawChart(t, curMode==='cap'? t.top_cap : t.top_chg);
}
function renderRel(){
  const t=curTheme; const ss=(t.stocks||[]).slice().sort(byChgS);
  let items='';
  for(const s of ss){
    items+=`<div class="stk2"><div class="top" onclick="openPopup('${s.cd}')" title="${s.nm} 상세">`
      +`<span class="snm">${s.nm}<span class="ssc">${s.sctr||''}</span></span>`
      +`<span class="srt ${cls(sVal(s))}">${fmt(sVal(s))}</span></div>`
      +(s.reason?`<div class="rs">${s.reason}</div>`:'')+`</div>`;
  }
  document.getElementById('relbox').innerHTML=
     `<div class="relhdr">관련종목 · ${t.name}<small>${t.cnt}종목 ▲${tUp(t)}▼${tDn(t)}</small></div>`
    +items;
  document.getElementById('relbox').scrollTop=0;
}
function drawChart(t, codes){
  const svg=d3.select('#chart'); const rect=svg.node().getBoundingClientRect();
  const W=rect.width, H=rect.height; svg.selectAll('*').remove();
  const series=(codes||[]).map((cd,i)=>{ const s=stkOf(t,cd);
      return {cd, nm:s?s.nm:cd, chg:s?sVal(s):null, data:HIST[cd]||[], color:LINE_COLORS[i%5]}; })
    .filter(s=>s.data.length);
  if(!series.length || W<20){ d3.select('#cleg').html('<span style="color:#8b949e">차트 데이터 없음</span>'); return; }
  const N=DATES.length;
  const x=d3.scaleLinear().domain([0,N-1]).range([12,W-12]);
  const allv=series.flatMap(s=>s.data);
  const y=d3.scaleLinear().domain([Math.min(0,d3.min(allv)),Math.max(0,d3.max(allv))]).nice().range([H-18,12]);
  // y 그리드(0 기준선 + 위아래 눈금)
  y.ticks(4).forEach(v=>{ svg.append('line').attr('x1',12).attr('x2',W-12).attr('y1',y(v)).attr('y2',y(v))
    .attr('stroke', v===0?'#3b4351':'#1b2230').attr('stroke-dasharray', v===0?'4,3':'0');
    svg.append('text').attr('x',12).attr('y',y(v)-2).attr('fill','#6e7681').attr('font-size','9px').text((v>0?'+':'')+v+'%'); });
  [0,Math.floor(N/2),N-1].forEach(i=> svg.append('text').attr('x',x(i)).attr('y',H-4)
    .attr('fill','#6e7681').attr('font-size','9px').attr('text-anchor',i===0?'start':(i===N-1?'end':'middle')).text(DATES[i]));
  const line=d3.line().x((d,i)=>x(i)).y(d=>y(d));
  series.forEach(s=> svg.append('path').attr('d',line(s.data)).attr('fill','none')
    .attr('stroke',s.color).attr('stroke-width',2).attr('opacity',0.92));
  mlWM(svg,W,H,Math.max(13,W/14));
  const leg=series.slice().sort((a,b)=>(b.data[b.data.length-1])-(a.data[a.data.length-1]));
  // 종목명 칸을 '제일 긴 종목' 기준 고정폭(em)으로 → 모든 줄이 줄바꿈 없이 한 줄, 당일/60일 정렬
  const wOf=nm=>{ let w=0; for(const ch of nm) w += (ch.charCodeAt(0)>0x7f?1.0:0.56); return w; };
  const nameW=Math.max(2,...leg.map(s=>wOf(s.nm)));
  d3.select('#cleg').html(leg.map(s=>{ const fin=Math.round(s.data[s.data.length-1]);
    return `<span class="li" onclick="openPopup('${s.cd}')"><i style="background:${s.color}"></i>`
      +`<span class="lnm" style="width:${nameW.toFixed(1)}em">${s.nm}</span>`
      +`<b class="d ${cls(s.chg)}">${fmtS(s.chg)}</b>`
      +`<b class="${cls(fin)}">(${fin>=0?'+':''}${fin}%)</b></span>`;
  }).join('') + `<span class="legnote">( ) 안은 60일 상승률</span>`);
}

/* ── 버블맵 ── */
const svg=d3.select('#bubbles');
function mlWM(sv,W,H,size){
  sv.append('text').attr('x',W/2).attr('y',H/2).attr('text-anchor','middle').attr('dominant-baseline','middle')
    .attr('fill','#ffffff').attr('opacity',0.14).attr('font-size',(size||Math.max(16,W/14))+'px')
    .attr('font-weight','700').attr('letter-spacing','0.08em').style('pointer-events','none')
    .text('moneyland.co.kr');
}
let curFilter='all', selNo=null;
function drawBubbles(){
  const rect=svg.node().getBoundingClientRect(); const W=rect.width, H=rect.height;
  svg.selectAll('*').remove();
  let data=THEMES.filter(t=> curFilter==='all'?true:(curFilter==='up'?tChg(t)>0:tChg(t)<0));
  if(!data.length || W<20 || H<20) return;
  // 크기 기준: 등락률(절대값 큰 순) 또는 거래대금
  const root=d3.hierarchy({children:data}).sum(d=> curMetric==='amt'
      ? Math.max(1, d.amt||1)
      : Math.max(0.3, Math.abs(tChg(d)||0)));
  d3.pack().size([W,H]).padding(3)(root);
  const g=svg.selectAll('g').data(root.leaves()).join('g')
    .attr('transform',d=>`translate(${d.x},${d.y})`)
    .on('click',(e,d)=> selectTheme(d.data));
  g.append('circle').attr('r',d=>d.r).attr('fill',d=>color(tChg(d.data)))
    .attr('class',d=>d.data.no===selNo?'sel':'')
    .append('title').text(d=>`${d.data.name}  ${fmt(tChg(d.data))}  거래대금 ${(d.data.amt||0).toLocaleString()}억`);
  g.append('text').each(function(d){
    if(d.r<15) return;
    const fs=Math.min(14,Math.max(8,d.r/3.0));
    const t=d3.select(this).attr('font-size',fs+'px');
    const nm=shortName(d.data.name), maxch=Math.max(2,Math.floor(d.r*1.75/fs));
    const lbl=nm.length>maxch ? nm.slice(0,maxch)+'…' : nm;
    t.append('tspan').attr('x',0).attr('dy','-0.05em').text(lbl);
    t.append('tspan').attr('x',0).attr('dy','1.05em').attr('font-size',(fs*0.82)+'px')
     .attr('fill','rgba(255,255,255,0.92)').text(fmtS(tChg(d.data)));
  });
  mlWM(svg,W,H,Math.max(20,W/13));
}
function highlight(){ svg.selectAll('circle').attr('class',d=>d.data.no===selNo?'sel':''); }
// 전체/상승/하락 필터 (data-f)
document.querySelectorAll('.filters button[data-f]').forEach(b=> b.onclick=()=>{
  document.querySelectorAll('.filters button[data-f]').forEach(x=>x.classList.remove('on'));
  b.classList.add('on'); curFilter=b.dataset.f; drawBubbles();
});

/* ── 크기/정렬 기준: 등락률('chg') ↔ 거래대금('amt') — 버블·우측리스트 양방향 동기화 ── */
let curMetric='chg';
function setMetric(m){
  curMetric=m;
  // 상단 '거래대금' 토글
  const top=document.querySelector('.filters button[data-m="amt"]');
  if(top) top.classList.toggle('on', m==='amt');
  // 우측 정렬 버튼
  document.querySelectorAll('.sortbtns button').forEach(b=>b.classList.toggle('on', b.dataset.m===m));
  // 헤더 타이틀
  document.getElementById('listTitle').textContent = m==='amt' ? '🔥 테마 (거래대금순)' : '🔥 테마 (등락률순)';
  drawBubbles(); renderList();
}
// 상단 '거래대금' (다시 누르면 등락률로 복귀)
document.querySelector('.filters button[data-m="amt"]').onclick =
  ()=> setMetric(curMetric==='amt' ? 'chg' : 'amt');
// 우측 사이드바 정렬 버튼
document.querySelectorAll('.sortbtns button').forEach(b=> b.onclick=()=> setMetric(b.dataset.m));

/* ── 우측 테마 리스트 (등락률순, 종목명 보이게, 토글 없음) ── */
function listCard(t){
  const top6=(t.stocks||[]).slice().sort(byChgS).slice(0,6);
  const chips=top6.map(s=>
     `<span class="chip" onclick="event.stopPropagation();openPopup('${s.cd}')" title="${s.nm}">`
    +`<span class="cnm">${s.nm}</span><span class="crt ${cls(sVal(s))}">${fmtS(sVal(s))}</span></span>`).join('');
  return `<div class="card" data-no="${t.no}" onclick="selectByNo(${t.no})">`
    +`<div class="hd"><span class="nm">${t.name}</span>`
    +`<span class="cnt">${t.cnt}종목<br>▲${tUp(t)}▼${tDn(t)}</span>`
    +`<span class="rt ${cls(tChg(t))}">${fmt(tChg(t))}</span></div>`
    +`<div class="chips">${chips}</div></div>`;
}
function renderList(){
  const sorted = THEMES.slice().sort(curMetric==='amt'
    ? (a,b)=>(b.amt||0)-(a.amt||0)
    : byChgT);
  document.getElementById('list').innerHTML = sorted.map(listCard).join('');
  markCard();
}
function markCard(){
  document.querySelectorAll('#list .card').forEach(c=> c.classList.toggle('sel', +c.dataset.no===selNo));
}

function openPopup(cd){
  try { if (window.parent && window.parent!==window && window.parent.openKrStock) window.parent.openKrStock(cd); }
  catch(e){}
}

/* ── 전체 재렌더 (세션 토글·라이브 갱신 시) ── */
function renderAll(){ recompute(); drawBubbles(); renderList();
  if(curTheme){ renderChart(); renderRel(); } highlight(); markCard(); }

/* ── 정규장 / NXT 시간외 토글 ── */
function setSess(m){ sessMode=m; try{sessionStorage.setItem('thememapSess',m);}catch(e){}
  document.querySelectorAll('#sesstg button').forEach(b=>b.classList.toggle('on',b.dataset.s===m));
  renderAll(); }
document.querySelectorAll('#sesstg button').forEach(b=>{
  b.classList.toggle('on',b.dataset.s===sessMode); b.onclick=()=>setSess(b.dataset.s); });

/* ── close vs live 실시간 시세 → 정규장·NXT 동시 계산 ── */
async function loadLive(){
  try{
    const t=Date.now();
    const [lv,cl]=await Promise.all([
      fetch('/moneyweb/api/kr_prices_live.json?t='+t).then(r=>r.ok?r.json():null),
      fetch('/moneyweb/api/kr_close_prices.json?t='+t).then(r=>r.ok?r.json():null),
    ]);
    const L=(lv&&lv.prices)||{}, C=(cl&&cl.prices)||{}, px={};
    const st0=(lv&&lv.market_status)||'';
    for(const cd in C){ const c=C[cd], l=L[cd];
      // 정규장 모드: 정규장(KRX) 중에는 라이브 ud_rt(당일), 그 외 시간엔 종가 스냅샷(직전 정규장) → 마켓맵과 일관, NXT값 누출 방지.
      const reg=(st0==='KRX'&&l&&l.ud_rt!=null)?l.ud_rt:((c&&c.ud_rt!=null)?c.ud_rt:null);
      // NXT 시간외: NXT 거래종목은 NXT API 자체 등락률(prdy_ctrt)을 그대로 사용(NXT 화면과 일치), 없으면 본장 종가 대비 역산.
      let nxt=null;
      if(l&&l.src==='NXT'&&l.ud_rt!=null) nxt=l.ud_rt;
      else if(c&&l&&c.curr_prc>0&&l.curr_prc>0) nxt=Math.round((l.curr_prc/c.curr_prc-1)*10000)/100;
      px[cd]={reg,nxt}; }
    PX=px;
    const st=(lv&&lv.market_status)||'', ut=(lv&&lv.updated_at)||'';
    const lbl={KRX:'정규장',NXT_PRE:'NXT 프리',NXT_EVE:'NXT 야간',CLOSED:'장마감'}[st]||st;
    const el=document.getElementById('liveBadge');
    if(el) el.textContent=(lbl||'')+(ut?' · '+ut.slice(11,16)+' 기준':'');
  }catch(e){}
  renderAll();
}

// 초기 렌더 + 자동선택 + 실시간
recompute();
renderList();
drawBubbles();
// 초기 자동 선택: 당일 등락률 가장 큰 테마 → 차트+관련종목 바로 표시
(function(){ const init=THEMES.slice().sort(byChgT)[0]; if(init) selectTheme(init); })();
loadLive();
setInterval(loadLive, 90000);
window.addEventListener('resize', ()=>{ drawBubbles(); if(curTheme) renderChart(); });
setTimeout(function(){ location.replace(location.pathname + '?t=' + Date.now()); }, 180000);
</script>
</body></html>
