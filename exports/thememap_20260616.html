  d3.select('#cleg').html(leg.map(s=>{ const fin=Math.round(s.data[s.data.length-1]);
    return `<span class="li" onclick="openPopup('${s.cd}')"><i style="background:${s.color}"></i>`
      +`<span class="lnm" style="width:${nameW.toFixed(1)}em">${s.nm}</span>`
      +`<b class="d ${cls(s.chg)}">${fmtS(s.chg)}</b>`
      +`<b class="${cls(fin)}">(${fin>=0?'+':''}${fin}%)</b></span>`;
  }).join('') + `<span class="legnote">( ) 안은 60일 상승률</span>`);
}

/* ── 버블맵 ── */
const svg=d3.select('#bubbles');
let curFilter='all', selNo=null;
function drawBubbles(){
  const rect=svg.node().getBoundingClientRect(); const W=rect.width, H=rect.height;
  svg.selectAll('*').remove();
  let data=THEMES.filter(t=> curFilter==='all'?true:(curFilter==='up'?t.chg>0:t.chg<0));
  if(!data.length || W<20 || H<20) return;
  // 크기 기준: 등락률(절대값 큰 순) 또는 거래대금
  const root=d3.hierarchy({children:data}).sum(d=> curMetric==='amt'
      ? Math.max(1, d.amt||1)
      : Math.max(0.3, Math.abs(d.chg||0)));
  d3.pack().size([W,H]).padding(3)(root);
  const g=svg.selectAll('g').data(root.leaves()).join('g')
    .attr('transform',d=>`translate(${d.x},${d.y})`)
    .on('click',(e,d)=> selectTheme(d.data));
  g.append('circle').attr('r',d=>d.r).attr('fill',d=>color(d.data.chg))
    .attr('class',d=>d.data.no===selNo?'sel':'')
    .append('title').text(d=>`${d.data.name}  ${fmt(d.data.chg)}  거래대금 ${(d.data.amt||0).toLocaleString()}억`);
  g.append('text').each(function(d){
    if(d.r<15) return;
    const fs=Math.min(14,Math.max(8,d.r/3.0));
    const t=d3.select(this).attr('font-size',fs+'px');
    const nm=shortName(d.data.name), maxch=Math.max(2,Math.floor(d.r*1.75/fs));
    const lbl=nm.length>maxch ? nm.slice(0,maxch)+'…' : nm;
    t.append('tspan').attr('x',0).attr('dy','-0.05em').text(lbl);
    t.append('tspan').attr('x',0).attr('dy','1.05em').attr('font-size',(fs*0.82)+'px')
     .attr('fill','rgba(255,255,255,0.92)').text(fmtS(d.data.chg));
  });
}
function highlight(){ svg.selectAll('circle').attr('class',d=>d.data.no===selNo?'sel':''); }
// 전체/상승/하락 필터 (data-f)
document.querySelectorAll('.filters button[data-f]').forEach(b=> b.onclick=()=>{
  document.querySelectorAll('.filters button[data-f]').forEach(x=>x.classList.remove('on'));
  b.classList.add('on'); curFilter=b.dataset.f; drawBubbles();
});

/* ── 크기/정렬 기준: 등락률('chg') ↔ 거래대금('amt') — 버블·우측리스트 양방향 동기화 ── */
let curMetric='chg';
function setMetric(m){
  curMetric=m;
  // 상단 '거래대금' 토글
  const top=document.querySelector('.filters button[data-m="amt"]');
  if(top) top.classList.toggle('on', m==='amt');
  // 우측 정렬 버튼
  document.querySelectorAll('.sortbtns button').forEach(b=>b.classList.toggle('on', b.dataset.m===m));
  // 헤더 타이틀
  document.getElementById('listTitle').textContent = m==='amt' ? '🔥 테마 (거래대금순)' : '🔥 테마 (등락률순)';
  drawBubbles(); renderList();
}
// 상단 '거래대금' (다시 누르면 등락률로 복귀)
document.querySelector('.filters button[data-m="amt"]').onclick =
  ()=> setMetric(curMetric==='amt' ? 'chg' : 'amt');
// 우측 사이드바 정렬 버튼
document.querySelectorAll('.sortbtns button').forEach(b=> b.onclick=()=> setMetric(b.dataset.m));

/* ── 우측 테마 리스트 (등락률순, 종목명 보이게, 토글 없음) ── */
function listCard(t){
  const top6=(t.stocks||[]).slice().sort(byChg).slice(0,6);
  const chips=top6.map(s=>
     `<span class="chip" onclick="event.stopPropagation();openPopup('${s.cd}')" title="${s.nm}">`
    +`<span class="cnm">${s.nm}</span><span class="crt ${cls(s.chg)}">${fmtS(s.chg)}</span></span>`).join('');
  return `<div class="card" data-no="${t.no}" onclick="selectByNo(${t.no})">`
    +`<div class="hd"><span class="nm">${t.name}</span>`
    +`<span class="cnt">${t.cnt}종목<br>▲${t.up??0}▼${t.down??0}</span>`
    +`<span class="rt ${cls(t.chg)}">${fmt(t.chg)}</span></div>`
    +`<div class="chips">${chips}</div></div>`;
}
function renderList(){
  const sorted = THEMES.slice().sort(curMetric==='amt'
    ? (a,b)=>(b.amt||0)-(a.amt||0)
    : byChg);
  document.getElementById('list').innerHTML = sorted.map(listCard).join('');
  markCard();
}
function markCard(){
  document.querySelectorAll('#list .card').forEach(c=> c.classList.toggle('sel', +c.dataset.no===selNo));
}

function openPopup(cd){
  try { if (window.parent && window.parent!==window && window.parent.openKrStock) window.parent.openKrStock(cd); }
  catch(e){}
}

renderList();
drawBubbles();
// 초기 자동 선택: 당일 등락률 가장 큰 테마 → 차트+관련종목 바로 표시
(function(){ const init=THEMES.slice().sort(byChg)[0]; if(init) selectTheme(init); })();
window.addEventListener('resize', ()=>{ drawBubbles(); if(curTheme) renderChart(); });
setTimeout(function(){ location.replace(location.pathname + '?t=' + Date.now()); }, 180000);
</script>
