<!DOCTYPE html>
<html lang="ko"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
<title>글로벌 테마맵</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
  *{box-sizing:border-box}
  body{margin:0;background:#0d1117;color:#c9d1d9;font-family:-apple-system,'Malgun Gothic',sans-serif;overflow:hidden}
  #bar{padding:8px 14px;display:flex;gap:10px;align-items:center;border-bottom:1px solid #21262d;font-size:13px}
  #nattabs{display:flex;gap:6px}
  #nattabs button{display:flex;align-items:center;gap:5px;background:#161b22;color:#8b949e;border:1px solid #30363d;border-radius:8px;padding:5px 11px;font-size:13px;font-weight:700;cursor:pointer}
  #nattabs button.on{background:#1f6feb;color:#fff;border-color:#1f6feb}
  #nattabs img{width:20px;height:14px;border-radius:2px;object-fit:cover;display:block}
  #wrap{display:flex;height:calc(100vh - 46px)}
  #left{flex:0 0 760px;display:flex;flex-direction:column;min-width:0;border-right:1px solid #21262d;position:relative}
  #sesstg{position:absolute;top:8px;left:8px;z-index:5;display:none;box-shadow:0 1px 4px rgba(0,0,0,.5)}
  #bubbles{flex:1.3;min-height:0}
  #bubbles text{pointer-events:none;text-anchor:middle;fill:#fff;font-weight:700}
  #bubbles g{cursor:pointer}
  #bubbles circle.sel{stroke:#fff;stroke-width:3px}
  #chartbox{flex:1;border-top:1px solid #21262d;display:flex;flex-direction:column;min-height:0;background:#0c1118}
  #chead{padding:6px 10px;font-size:12px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  #chead .nm{font-weight:700;font-size:13px}
  .tg{display:inline-flex;border:1px solid #30363d;border-radius:5px;overflow:hidden}
  .tg button{background:#161b22;color:#c9d1d9;border:none;padding:3px 9px;font-size:11px;cursor:pointer}
  .tg button.on{background:#1f6feb;color:#fff}
  #chartrow{flex:1;min-height:0;display:flex}
  #chart{flex:1;min-width:0;min-height:0}
  #cleg{width:200px;flex-shrink:0;overflow-y:auto;display:flex;flex-direction:column;gap:13px;padding:8px 8px 8px 10px;border-left:1px solid #21262d}
  #cleg .li{font-size:11px;line-height:1.3;cursor:pointer;display:flex;align-items:center;gap:5px;white-space:nowrap}
  #cleg .li:hover{color:#fff}
  #cleg .li i{width:11px;height:3px;border-radius:2px;flex:none}
  #cleg .li .lnm{flex:none;display:inline-block;overflow:hidden}
  #cleg .li b{flex:none;display:inline-block}
  #cleg .li b.d{width:4em;text-align:right}
  #cleg .legnote{font-size:9.5px;color:#6e7681;margin-top:2px;line-height:1.3}
  #mid{flex:1;min-width:0;border-right:1px solid #21262d;overflow-y:auto;padding:10px}
  #right{width:330px;flex-shrink:0;overflow-y:auto;padding:10px}
  .hd{font-weight:700;font-size:14px;margin-bottom:6px}
  .sub{color:#8b949e;font-size:11px}
  .stk{display:flex;justify-content:space-between;gap:6px;padding:5px 6px;border-radius:5px;cursor:pointer;font-size:12.5px}
  .stk:hover{background:#161b22}
  .stk .rs{color:#8b949e;font-size:10.5px;margin-top:2px;line-height:1.35}
  .up{color:#f85149}.dn{color:#58a6ff}
  .thm{padding:7px 8px;border-radius:6px;cursor:pointer;margin-bottom:5px;background:#11161d}
  .thm:hover{background:#1b2230}
  .thm .t{display:flex;justify-content:space-between;font-weight:700;font-size:13px}
  .thm .mini{font-size:10.5px;color:#8b949e;margin-top:3px;display:flex;flex-wrap:wrap;gap:5px}
  .empty{color:#8b949e;font-size:12px;padding:14px;text-align:center;line-height:1.7}
  /* 모바일(≤768px): 3열 대시보드를 세로 순차로 — 버블 → 상위종목 차트 → 관련종목 → 테마목록. PC 무영향. */
  @media (max-width:768px){
    html,body{overflow:auto;height:auto}
    #bar{flex-wrap:wrap;gap:8px}
    #nattabs{flex-wrap:wrap}
    #nattabs button{padding:5px 9px;font-size:12px}
    #wrap{flex-direction:column;height:auto}
    #left{flex:none;width:100%;border-right:none;border-bottom:1px solid #21262d}
    #bubbles{flex:none;height:300px}
    #chartbox{flex:none}
    #chartrow{flex-direction:column;height:auto}
    #chart{flex:none;height:240px}
    #cleg{width:100%;border-left:none;border-top:1px solid #21262d;flex-direction:row;flex-wrap:wrap;gap:8px}
    #mid{flex:none;width:100%;border-right:none;border-bottom:1px solid #21262d;overflow:visible}
    #right{flex:none;width:100%;overflow:visible}
  }
</style></head>
<body>
<div id="bar"><strong>글로벌 테마맵</strong><div id="nattabs"></div>
  <span class="sub" id="meta"></span></div>
<div id="wrap">
  <div id="left">
    <div id="sesstg" class="tg"><button id="btnReg" class="on" onclick="setSess('reg')">정규장</button><button id="btnAh" onclick="setSess('ah')">시간외</button></div>
    <svg id="bubbles"></svg>
    <div id="chartbox"><div id="chead"><span class="sub">버블/테마 클릭 → 대표종목 60일 추이</span></div>
      <div id="chartrow"><svg id="chart"></svg><div id="cleg"></div></div></div>
  </div>
  <div id="mid"><div class="empty">테마를 클릭하면<br>관련종목 + 기업개요가<br>여기 표시됩니다</div></div>
  <div id="right"></div>
</div>
<script>
const DATA = {};
let LIVE={}, NH={}, curNat=null, curTheme=null, curMode='chg', listMode='chg', sessMode='reg';
function nhMark(code){ const t=NH[code]; return t==='ath'?'<span title="역대 신고가" style="color:#fbbf24">🏆</span> ':(t==='52w'?'<span title="52주 신고가" style="color:#3fb950">📈</span> ':''); }
// sessMode: 'reg'=정규장(v.c) / 'ah'=시간외(v.e, 미국만). 시간외 없으면 정규장으로 폴백.
function liveCr(code,baked){ const v=LIVE[code]; if(v){
  if(curNat==='USA'&&sessMode==='ah') return v.e!=null?v.e:(v.c!=null?v.c:baked);
  if(v.c!=null) return v.c;
  if(curNat==='USA'&&v.e!=null) return v.e;
} return baked; }
function color(cr){ if(cr==null)return '#30363d'; const c=Math.max(-3,Math.min(3,cr))/3;
  return c>=0?`rgb(${40+c*200|0},${44-c*20|0},${52-c*40|0})`:`rgb(${40+c*15|0},${70-c*70|0},${60-c*150|0})`; }
function fmtCap(v){ if(v>=1e12)return (v/1e12).toFixed(1)+'T'; if(v>=1e9)return (v/1e9).toFixed(0)+'B'; return (v/1e6).toFixed(0)+'M'; }
function symOf(code){ return curNat==='USA'?code.split('.')[0]:null; }
function lbl(m){ return curNat==='USA'?m.code.split('.')[0]:(m.name||m.code); }
function thmCr(t){ return wavgLive(t); }
function wavgLive(t){ let n=0,d=0; (t.members||[]).forEach(m=>{const cr=liveCr(m.code,m.changeRate);if(cr!=null&&m.marketCap){n+=cr*m.marketCap;d+=m.marketCap;}}); return d?Math.round(n/d*100)/100:t.changeRate; }

function renderBubbles(){
  const ths=DATA[curNat].themes;
  const box=document.getElementById('bubbles'); const W=box.clientWidth||700,H=box.clientHeight||400;
  const svg=d3.select('#bubbles').attr('width',W).attr('height',H).attr('viewBox',`0 0 ${W} ${H}`); svg.selectAll('*').remove();
  const root=d3.hierarchy({children:ths}).sum(d=>d.marketCap||0);
  d3.pack().size([W,H-2]).padding(3)(root);
  const g=svg.append('g');
  const node=g.selectAll('g').data(root.leaves()).enter().append('g').attr('transform',d=>`translate(${d.x},${d.y})`).on('click',(e,d)=>selectTheme(d.data.name));
  node.append('circle').attr('r',d=>d.r).attr('fill',d=>color(thmCr(d.data))).attr('stroke','rgba(255,255,255,.12)')
    .classed('sel',d=>d.data.name===curTheme)
    .append('title').text(d=>`${d.data.name}\n${thmCr(d.data)>0?'+':''}${thmCr(d.data)}% · 시총 ${fmtCap(d.data.marketCap)} · ${d.data.count}종목`);
  node.filter(d=>d.r>26).append('text').attr('dy','-.1em').attr('font-size',d=>Math.min(13,d.r/3.5)).text(d=>{const m=Math.floor(d.r/6);return d.data.name.length>m?d.data.name.slice(0,m):d.data.name;});
  node.filter(d=>d.r>26).append('text').attr('dy','1.15em').attr('font-size',d=>Math.min(11,d.r/4.5)).attr('fill',d=>thmCr(d.data)>=0?'#ffd0cc':'#cfe3ff').text(d=>{const c=thmCr(d.data);return (c>0?'+':'')+c+'%';});
  mlWatermark(svg,W,H,Math.max(22,W/13));
}
function mlWatermark(svg,W,H,size){
  svg.append('text').attr('x',W/2).attr('y',H/2).attr('text-anchor','middle').attr('dominant-baseline','middle')
     .attr('fill','#ffffff').attr('opacity',0.14).attr('font-size',size||Math.max(14,W/16))
     .attr('font-weight','700').attr('letter-spacing','0.08em').attr('pointer-events','none')
     .text('moneyland.co.kr');
}
const LINE_COLORS=['#f85149','#58a6ff','#3fb950','#d29922','#a371f7'];
function renderChart(){
  const t=DATA[curNat].themes.find(x=>x.name===curTheme); if(!t)return;
  const charts=DATA[curNat].charts||{};
  const codes=(curMode==='chg'?t.topChg:t.topCap);
  document.getElementById('chead').innerHTML=`<span class="nm">${t.name}</span><span class="sub">60일 누적등락률</span>`
   +`<span class="tg"><button class="${curMode==='chg'?'on':''}" onclick="setMode('chg')">오늘 강한 5</button><button class="${curMode==='cap'?'on':''}" onclick="setMode('cap')">시총 큰 5</button></span>`;
  const memByCode={}; (t.members||[]).forEach(m=>memByCode[m.code]=m);
  const series=codes.map((c,i)=>{const ser=charts[c];if(!ser||ser.length<2)return null;const b=ser[0].c;const m=memByCode[c]||{code:c};
      return {code:c,name:lbl(m),chg:liveCr(c,m.changeRate),color:LINE_COLORS[i%5],pts:ser.map((p,j)=>({i:j,v:(p.c/b-1)*100}))};}).filter(Boolean);
  const svg=d3.select('#chart'); const box=document.getElementById('chart'); const W=box.clientWidth||440,H=box.clientHeight||160,m={t:8,r:12,b:16,l:34};
  svg.attr('width',W).attr('height',H).attr('viewBox',`0 0 ${W} ${H}`); svg.selectAll('*').remove();
  if(!series.length||W<20){svg.append('text').attr('x',W/2).attr('y',H/2).attr('fill','#8b949e').attr('text-anchor','middle').attr('font-size',12).text('차트 데이터 없음');
    document.getElementById('cleg').innerHTML='<span style="color:#8b949e;font-size:11px">차트 데이터 없음</span>';return;}
  const n=Math.max(...series.map(s=>s.pts.length)); const allv=series.flatMap(s=>s.pts.map(p=>p.v));
  const x=d3.scaleLinear().domain([0,n-1]).range([m.l,W-m.r]); const y=d3.scaleLinear().domain([Math.min(0,...allv),Math.max(0,...allv)]).nice().range([H-m.b,m.t]);
  y.ticks(4).forEach(v=>{svg.append('line').attr('x1',m.l).attr('x2',W-m.r).attr('y1',y(v)).attr('y2',y(v)).attr('stroke',v===0?'#3b4351':'#1b2230').attr('stroke-dasharray',v===0?'4,3':'0');
    svg.append('text').attr('x',m.l).attr('y',y(v)-2).attr('fill','#6e7681').attr('font-size','9px').text((v>0?'+':'')+Math.round(v)+'%');});
  const line=d3.line().x(p=>x(p.i)).y(p=>y(p.v));
  series.forEach(s=>svg.append('path').attr('d',line(s.pts)).attr('fill','none').attr('stroke',s.color).attr('stroke-width',1.8).attr('opacity',.92));
  // 우측 세로 범례: 색칩 · 종목명 · 당일% · (60일%), 60일 상승률순 정렬
  const leg=series.slice().sort((a,b)=>b.pts[b.pts.length-1].v-a.pts[a.pts.length-1].v);
  const wOf=nm=>{let w=0;for(const ch of nm)w+=(ch.charCodeAt(0)>0x7f?1.0:0.56);return w;};
  const nameW=Math.max(2,...leg.map(s=>wOf(s.name)));
  document.getElementById('cleg').innerHTML=leg.map(s=>{const fin=Math.round(s.pts[s.pts.length-1].v);const cr=s.chg;
    return `<span class="li" onclick="popup('${s.code}','${(s.name||'').replace(/'/g,'')}',${cr})"><i style="background:${s.color}"></i>`
      +`<span class="lnm" style="width:${nameW.toFixed(1)}em">${s.name}</span>`
      +`<b class="d ${cr>=0?'up':'dn'}">${cr>0?'+':''}${cr==null?'-':cr}%</b>`
      +`<b class="${fin>=0?'up':'dn'}">(${fin>=0?'+':''}${fin}%)</b></span>`;}).join('')
    +`<span class="legnote">( ) 안은 60일 상승률</span>`;
  mlWatermark(svg,W,H,Math.max(13,W/14));
}
function renderMid(){
  const t=DATA[curNat].themes.find(x=>x.name===curTheme);
  const mid=document.getElementById('mid'); if(!t){return;}
  mid.innerHTML=`<div class="hd">${t.name} <span class="sub">${t.count}종목 ▲${t.up} ▼${t.down}</span></div>`
   + (t.members||[]).map(m=>{const cr=liveCr(m.code,m.changeRate);
       return `<div class="stk" onclick="popup('${m.code}','${(m.name||'').replace(/'/g,'')}',${cr})">
         <div><div>${nhMark(m.code)}${lbl(m)} <span class="${cr>=0?'up':'dn'}">${cr>0?'+':''}${cr}%</span></div><div class="rs">${m.reason||''}</div></div></div>`;}).join('');
}
function renderRight(){
  const ths=DATA[curNat].themes.slice();
  ths.sort(listMode==='chg'?(a,b)=>thmCr(b)-thmCr(a):(a,b)=>b.marketCap-a.marketCap);
  const r=document.getElementById('right');
  r.innerHTML=`<div class="hd">🔥 테마 <span class="tg"><button class="${listMode==='chg'?'on':''}" onclick="setListMode('chg')">등락순</button><button class="${listMode==='cap'?'on':''}" onclick="setListMode('cap')">시총순</button></span></div>`
   + ths.map(t=>{const c=thmCr(t);const tops=(t.members||[]).slice(0,5).map(m=>{const cr=liveCr(m.code,m.changeRate);return `<span class="${cr>=0?'up':'dn'}">${lbl(m).slice(0,6)} ${cr>0?'+':''}${cr}%</span>`;}).join('');
     return `<div class="thm" onclick="selectTheme('${t.name}')"><div class="t"><span>${t.name}</span><span class="${c>=0?'up':'dn'}">${c>0?'+':''}${c}%</span></div><div class="mini">${tops}</div></div>`;}).join('');
}
function selectTheme(name){ curTheme=name; renderBubbles(); renderChart(); renderMid(); }
function setMode(m){ curMode=m; renderChart(); }
function setListMode(m){ listMode=m; renderRight(); }
function setSess(m){ sessMode=m; document.getElementById('btnReg').className=m==='reg'?'on':''; document.getElementById('btnAh').className=m==='ah'?'on':''; renderBubbles(); renderChart(); renderMid(); renderRight(); }
function updSessTg(){ const el=document.getElementById('sesstg'); if(el)el.style.display=curNat==='USA'?'inline-flex':'none'; }
function popup(code,name,cr){ const k=curNat==='USA'?code.split('.')[0].toUpperCase():code; try{if(window.parent&&window.parent!==window&&window.parent.glPopup)window.parent.glPopup(k,{name,change:cr});}catch(e){} }
// 대시보드 렌더(모바일=세로 순차/PC=3열, 레이아웃은 CSS가 처리). 한 곳에서 호출해 일관 유지.
function mobileOrDash(){ renderBubbles(); renderChart(); renderMid(); renderRight(); }
function renderAll(){ const d=DATA[curNat]; document.getElementById('meta').textContent=`${d.nationName} · 테마 ${d.themes.length}개`; if(!curTheme&&d.themes.length)curTheme=d.themes[0].name; updSessTg(); mobileOrDash(); }
function loadLive(){ fetch('/moneyweb/api/world_marketmap_live.json?t='+Date.now()).then(r=>r.json()).then(j=>{LIVE=j.prices||{};mobileOrDash();}).catch(()=>{}); }
function loadNH(){ fetch('/moneyweb/api/world_newhigh.json?t='+Date.now()).then(r=>r.json()).then(j=>{NH={};Object.values(j.items||{}).forEach(a=>a.forEach(x=>{NH[x.code]=(x.type||[]).includes('ath')?'ath':'52w';}));mobileOrDash();}).catch(()=>{}); }
const FCC={USA:'us',CHN:'cn',HKG:'hk',JPN:'jp',VNM:'vn'};
const tabs=document.getElementById('nattabs');
function renderNatTabs(){ tabs.innerHTML=Object.keys(DATA).map(n=>`<button class="${n===curNat?'on':''}" onclick="setNat('${n}')"><img src="https://flagcdn.com/w40/${FCC[n]||''}.png" alt="">${DATA[n].nationName}</button>`).join(''); }
function setNat(n){ curNat=n; curTheme=null; renderNatTabs(); renderAll(); }
function boot(){ if(!curNat)curNat=Object.keys(DATA)[0]; renderNatTabs(); renderAll(); loadLive(); setInterval(loadLive,180000); loadNH(); setInterval(loadNH,180000); }
window.addEventListener('load',boot); requestAnimationFrame(()=>requestAnimationFrame(()=>{if(!curNat)boot();}));
let rz;window.addEventListener('resize',()=>{clearTimeout(rz);rz=setTimeout(mobileOrDash,150);});
</script></body></html>
