<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>마켓맵 — KOSPI 200 / KOSDAQ 150</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 100%;
  height: 100%;
}
body {
  background: #070d1a;
  color: #e2e8f0;
  font-family: 'Noto Sans KR', sans-serif;
  min-height: 100vh;
  width: 100vw;
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  overflow-x: hidden;
}

/* ── 헤더 ── */
#header {
  background: #0f1829;
  border-bottom: 1px solid #1e2d47;
  padding: 0 16px;
  height: 46px;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
}
.title {
  font-size: 15px;
  font-weight: 700;
  background: linear-gradient(90deg, #f59e0b, #fbbf24);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.status-badge {
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 4px;
  font-weight: 600;
}
.status-KRX    { background: #14532d; color: #4ade80; }
.status-NXT_PRE,.status-NXT_EVE { background: #1e3a5f; color: #60a5fa; }
.status-CLOSED { background: #2d1a1a; color: #94a3b8; }
.updated-at { font-size: 11px; color: #64748b; }
.spacer { flex: 1; }

/* 시장 탭 네비 바 */
#mkt-nav {
  background: #0a1525;
  border-bottom: 1px solid #1e2d47;
  padding: 5px 10px;
  display: flex;
  gap: 6px;
  flex-shrink: 0;
}
.mkt-tab {
  padding: 4px 16px;
  border-radius: 5px;
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  border: 1px solid #1e2d47;
  color: #94a3b8;
  background: transparent;
  transition: all .15s;
  user-select: none;
}
.mkt-tab:hover { background: #162033; color: #e2e8f0; }
.mkt-tab.active { background: #1e3a5f; color: #60a5fa; border-color: #2563eb; }

/* 범례 */
.legend {
  display: flex;
  align-items: center;
  gap: 0;
  font-size: 10px;
  color: #64748b;
}
.legend-bar {
  width: 120px;
  height: 10px;
  border-radius: 2px;
  background: linear-gradient(to right, #1d4ed8, #3b82f6, #475569, #ef4444, #b91c1c);
  margin: 0 4px;
}

/* ── 본문 영역 ── */
#main {
  display: flex;
  flex-direction: column;
  gap: 4px;
  padding: 6px 24px;
}

.market-block {
  display: flex;
  flex-direction: column;
}
/* KOSPI: 뷰포트보다 약간 작게 → 아래에 KOSDAQ가 살짝 보임 */
.market-block.kospi  { height: calc(100vh - 110px); }
.market-block.kosdaq { height: calc(100vh - 62px); }

.market-label {
  font-size: 11px;
  font-weight: 700;
  color: #94a3b8;
  padding: 2px 4px;
  letter-spacing: 0.05em;
  flex-shrink: 0;
}
.market-label span { color: #f59e0b; margin-left: 4px; font-weight: 500; font-size: 10px; }

.treemap-wrap {
  flex: 1;
  width: 100%;
  position: relative;
}

svg { display: block; }

/* 호버 팝업 */
#popup {
  position: fixed;
  background: #ffffff;
  border-radius: 6px;
  padding: 10px 14px;
  font-size: 12px;
  pointer-events: none;
  opacity: 0;
  transition: opacity .12s;
  z-index: 999;
  width: 180px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.45);
}
#popup .pp-sector { font-size: 10px; font-weight: 700; color: #64748b; margin-bottom: 2px; }
#popup .pp-name   { font-size: 16px; font-weight: 900; color: #0f172a; line-height: 1.2; }
#popup .pp-code   { font-size: 10px; color: #94a3b8; margin-bottom: 6px; }
#popup .pp-price  { font-size: 18px; font-weight: 700; }
#popup .pp-ud     { font-size: 12px; font-weight: 600; margin-top: 1px; }
#popup .pp-mktcap { font-size: 10px; color: #64748b; margin-top: 5px; padding-top: 5px; border-top: 1px solid #e2e8f0; }
#popup .up   { color: #dc2626; }
#popup .down { color: #2563eb; }
#popup .flat { color: #64748b; }

/* 클릭 모달 */
#modal-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.55);
  z-index: 1000;
  align-items: center;
  justify-content: center;
}
#modal-overlay.open { display: flex; }
#modal-box {
  background: #ffffff;
  border-radius: 12px;
  padding: 20px 22px 18px;
  width: 260px;
  box-shadow: 0 8px 40px rgba(0,0,0,0.5);
  position: relative;
}
#modal-close {
  position: absolute; top: 10px; right: 12px;
  font-size: 18px; color: #94a3b8; cursor: pointer;
  line-height: 1; border: none; background: none; padding: 2px 4px;
}
#modal-close:hover { color: #475569; }
.md-sector { font-size: 11px; font-weight: 700; color: #64748b; margin-bottom: 3px; }
.md-name   { font-size: 22px; font-weight: 900; color: #0f172a; line-height: 1.2; }
.md-code   { font-size: 11px; color: #94a3b8; margin-bottom: 10px; }
.md-price  { font-size: 26px; font-weight: 800; }
.md-ud     { font-size: 14px; font-weight: 700; margin-top: 2px; }
.md-mktcap { font-size: 11px; color: #64748b; margin-top: 10px; padding-top: 10px; border-top: 1px solid #e2e8f0; }
.md-btn {
  display: block; margin-top: 14px;
  background: #1d4ed8; color: #fff;
  border: none; border-radius: 7px;
  padding: 9px 0; width: 100%;
  font-size: 13px; font-weight: 700; cursor: pointer;
  text-align: center; text-decoration: none;
}
.md-btn:hover { background: #1e40af; }
.md-up   { color: #dc2626; }
.md-down { color: #2563eb; }
.md-flat { color: #64748b; }
</style>
</head>
<body>

<div id="header">
  <div class="title">마켓맵</div>
  <span id="statusBadge" class="status-badge">-</span>
  <span id="updatedAt" class="updated-at">-</span>
  <div class="spacer"></div>
  <div class="legend">
    <span>-3%</span>
    <div class="legend-bar"></div>
    <span>+3%</span>
  </div>
</div>

<div id="mkt-nav">
  <div class="mkt-tab active" id="tabKospi" onclick="scrollToMarket('kospi')">KOSPI 200</div>
  <div class="mkt-tab"        id="tabKosdaq" onclick="scrollToMarket('kosdaq')">KOSDAQ 150</div>
</div>

<div id="main">
  <div class="market-block kospi" id="sectionKospi">
    <div class="market-label">KOSPI 200 <span id="kospiStat"></span></div>
    <div class="treemap-wrap" id="kospiWrap"></div>
  </div>
  <div class="market-block kosdaq" id="sectionKosdaq">
    <div class="market-label">KOSDAQ 150 <span id="kosdaqStat"></span></div>
    <div class="treemap-wrap" id="kosdaqWrap"></div>
  </div>
</div>

<div id="popup">
  <div class="pp-sector" id="ppSector"></div>
  <div class="pp-name"   id="ppName"></div>
  <div class="pp-code"   id="ppCode"></div>
  <div class="pp-price"  id="ppPrice"></div>
  <div class="pp-ud"     id="ppUd"></div>
  <div class="pp-mktcap" id="ppMktcap"></div>
</div>

<div id="modal-overlay">
  <div id="modal-box">
    <button id="modal-close" onclick="closeModal()">✕</button>
    <div class="md-sector" id="mdSector"></div>
    <div class="md-name"   id="mdName"></div>
    <div class="md-code"   id="mdCode"></div>
    <div class="md-price"  id="mdPrice"></div>
    <div class="md-ud"     id="mdUd"></div>
    <div class="md-mktcap" id="mdMktcap"></div>
    <a  class="md-btn"     id="mdTvLink" href="#" target="_blank">TradingView 차트 보기 →</a>
  </div>
</div>

<script>
const DATA_URL = 'api/kr_marketmap.json';
const REFRESH_MS = 60_000;

const colorScale = d3.scaleLinear()
  .domain([-3, -0.5, 0, 0.5, 3])
  .range(["#1d4ed8", "#3b82f6", "#475569", "#ef4444", "#b91c1c"])
  .clamp(true);

const fmtMktcap = v => {
  const jo = v / 1e12;
  if (jo >= 1) return jo.toFixed(1) + '조';
  return (v / 1e8).toFixed(0) + '억';
};

const popup = document.getElementById('popup');
const POPUP_W = 180;
const POPUP_H = 120; // 예상 높이

// 현재 하이라이트 rect (SVG 요소)
let _hlRect = null;

function showPopup(svgEl, d) {
  const s = d.data;
  const ud = s.ud_rt;
  const cls = ud > 0 ? 'up' : ud < 0 ? 'down' : 'flat';
  const sign = ud > 0 ? '+' : '';

  document.getElementById('ppSector').textContent = s.sector || '';
  document.getElementById('ppName').textContent   = s.name;
  document.getElementById('ppCode').textContent   = s.code;
  document.getElementById('ppPrice').innerHTML    = s.curr_prc > 0
    ? `<span class="${cls}">${s.curr_prc.toLocaleString('ko-KR')}원</span>`
    : '<span class="flat">-</span>';
  document.getElementById('ppUd').innerHTML = s.curr_prc > 0
    ? `<span class="${cls}">${sign}${s.ud_rt.toFixed(2)}% (${sign}${s.ud_prc.toLocaleString('ko-KR')}원)</span>`
    : '';
  document.getElementById('ppMktcap').textContent = '시총 ' + fmtMktcap(s.mktcap);

  // 셀의 화면 좌표 계산
  const svgRect = svgEl.getBoundingClientRect();
  const cellL = svgRect.left + d.x0;
  const cellR = svgRect.left + d.x1;
  const cellT = svgRect.top  + d.y0;

  // 팝업 위치: 셀 오른쪽 우선, 화면 밖이면 왼쪽
  let px = cellR + 6;
  if (px + POPUP_W > window.innerWidth - 4) px = cellL - POPUP_W - 6;
  let py = cellT;
  if (py + POPUP_H > window.innerHeight - 4) py = window.innerHeight - POPUP_H - 4;

  popup.style.left    = px + 'px';
  popup.style.top     = py + 'px';
  popup.style.opacity = '1';

  // 셀 흰색 하이라이트 테두리
  _clearHighlight();
  const svg = svgEl;
  const hl = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  hl.setAttribute('x',      d.x0 + 1);
  hl.setAttribute('y',      d.y0 + 1);
  hl.setAttribute('width',  Math.max(0, d.x1 - d.x0 - 2));
  hl.setAttribute('height', Math.max(0, d.y1 - d.y0 - 2));
  hl.setAttribute('fill',   'rgba(255,255,255,0.18)');
  hl.setAttribute('stroke', '#ffffff');
  hl.setAttribute('stroke-width', '2');
  hl.setAttribute('rx', '1');
  hl.style.pointerEvents = 'none';
  svg.appendChild(hl);
  _hlRect = { el: hl, svg };
}

function hidePopup() {
  popup.style.opacity = '0';
  _clearHighlight();
}

function openModal(d) {
  const s = d.data;
  const ud = s.ud_rt;
  const cls = ud > 0 ? 'md-up' : ud < 0 ? 'md-down' : 'md-flat';
  const sign = ud > 0 ? '+' : '';

  document.getElementById('mdSector').textContent = s.sector || '';
  document.getElementById('mdName').textContent   = s.name;
  document.getElementById('mdCode').textContent   = s.code;
  document.getElementById('mdPrice').innerHTML    = s.curr_prc > 0
    ? `<span class="${cls}">${s.curr_prc.toLocaleString('ko-KR')}원</span>`
    : '<span class="md-flat">-</span>';
  document.getElementById('mdUd').innerHTML = s.curr_prc > 0
    ? `<span class="${cls}">${sign}${ud.toFixed(2)}% (${sign}${s.ud_prc.toLocaleString('ko-KR')}원)</span>`
    : '';
  document.getElementById('mdMktcap').textContent = '시총 ' + fmtMktcap(s.mktcap);
  document.getElementById('mdTvLink').href =
    `https://www.tradingview.com/chart/?symbol=KRX%3A${s.code}`;

  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}

document.getElementById('modal-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

function _clearHighlight() {
  if (_hlRect) {
    try { _hlRect.svg.removeChild(_hlRect.el); } catch(e) {}
    _hlRect = null;
  }
}

// 섹터 헤더 구분색 팔레트 (전역 — 두 트리맵 간 색상 공유)
const SECTOR_COLORS = [
  '#1e3a5f','#1a3a2a','#3a1e3a','#3a2a14','#14283a',
  '#2a1a3a','#3a1a1e','#1e3a2a','#283a14','#3a1a2a',
  '#1a1e3a','#2a1e14','#1e2a3a','#3a2a1e','#143a14',
];
const _sectorColorMap = new Map();
let _sectorColorIdx = 0;
function getSectorColor(name) {
  if (!_sectorColorMap.has(name))
    _sectorColorMap.set(name, SECTOR_COLORS[_sectorColorIdx++ % SECTOR_COLORS.length]);
  return _sectorColorMap.get(name);
}

function buildTreemap(container, stocks) {
  const wrap = document.getElementById(container);
  wrap.innerHTML = '';
  const W = wrap.clientWidth;
  const H = wrap.clientHeight;
  if (!W || !H || !stocks.length) return;

  const root = d3.hierarchy({
    name: 'root',
    children: Array.from(
      d3.group(stocks, d => d.sector),
      ([sector, items]) => ({ name: sector, children: items })
    ),
  })
  .sum(d => d.mktcap || 0)
  .sort((a, b) => b.value - a.value);

  // OUTER_PAD: 섹터 외곽 여백 (셀도 이만큼 inset됨 → 헤더와 정확히 일치)
  const OUTER_PAD = 4;
  const HEADER_H  = 20;

  d3.treemap()
    .size([W, H])
    .paddingOuter(OUTER_PAD)
    .paddingTop(OUTER_PAD + HEADER_H)  // 셀 시작 = y0 + OUTER_PAD + HEADER_H
    .paddingRight(OUTER_PAD)
    .paddingBottom(OUTER_PAD)
    .paddingLeft(OUTER_PAD)
    .paddingInner(1)
    .round(true)(root);

  const svg = d3.create('svg')
    .attr('width', W)
    .attr('height', H)
    .style('display', 'block');

  const defs    = svg.append('defs');
  const sectorHighlights = {};

  // ── 섹터 배경 + 헤더바 + 섹터명 ──
  // inner 좌표: 셀과 정확히 동일한 x/y 범위
  (root.children || []).forEach((sec, si) => {
    const ix0 = sec.x0 + OUTER_PAD;        // 셀과 같은 left
    const iy0 = sec.y0 + OUTER_PAD;        // 헤더 top (셀 위쪽)
    const iw  = (sec.x1 - sec.x0) - OUTER_PAD * 2;  // 셀과 같은 width
    const ih  = (sec.y1 - sec.y0) - OUTER_PAD * 2;  // 전체 inner height
    if (iw < 2 || ih < 2) return;

    const sc  = getSectorColor(sec.data.name);

    // ① 섹터 배경 (inner 영역 전체) — 항상 보이는 테두리로 섹터 구분
    svg.append('rect')
      .attr('x', ix0).attr('y', iy0)
      .attr('width', iw).attr('height', ih)
      .attr('fill', '#0b1a2e')
      .attr('stroke', 'rgba(255,255,255,0.55)')
      .attr('stroke-width', '2')
      .attr('rx', 3);

    // ② 헤더바 (inner 폭 × HEADER_H) — 셀과 동일한 x 범위
    svg.append('rect')
      .attr('x', ix0).attr('y', iy0)
      .attr('width', iw).attr('height', HEADER_H)
      .attr('fill', sc).attr('rx', 3);
    svg.append('rect')   // 하단 모서리 직각
      .attr('x', ix0).attr('y', iy0 + HEADER_H - 4)
      .attr('width', iw).attr('height', 4)
      .attr('fill', sc);

    // ③ 섹터명 — 인덱스 기반 clipPath (한글 포함 ID 버그 방지)
    if (iw > 16) {
      const cid = `sc${si}-${container}`;
      defs.append('clipPath').attr('id', cid)
        .append('rect')
        .attr('x', ix0 + 3).attr('y', iy0)
        .attr('width', Math.max(0, iw - 6))
        .attr('height', HEADER_H);

      const lfs = Math.min(13, Math.max(8, iw / 8));
      svg.append('text')
        .attr('x', ix0 + 5)
        .attr('y', iy0 + HEADER_H / 2 + lfs * 0.38)
        .attr('clip-path', `url(#${cid})`)
        .attr('fill', '#ffffff')
        .attr('font-size', lfs + 'px')
        .attr('font-weight', '700')
        .text(sec.data.name);
    }

    // ④ 헤더 호버 히트 영역 (헤더 전체에 투명 rect)
    svg.append('rect')
      .attr('x', ix0).attr('y', iy0)
      .attr('width', iw).attr('height', HEADER_H)
      .attr('fill', 'transparent')
      .style('cursor', 'default')
      .on('mouseenter', function() {
        hidePopup();
        Object.values(sectorHighlights).forEach(r => r.attr('opacity', 0));
        sectorHighlights[sec.data.name]?.attr('opacity', 1);
      })
      .on('mouseleave', function() {
        sectorHighlights[sec.data.name]?.attr('opacity', 0);
      });
  });

  // ── 개별 종목 셀 ──
  root.leaves().forEach((d, i) => {
    const w = d.x1 - d.x0;
    const h = d.y1 - d.y0;
    if (w < 2 || h < 2) return;

    const clipId = `cp-${container}-${i}`;
    defs.append('clipPath').attr('id', clipId)
      .append('rect')
      .attr('x', d.x0 + 1).attr('y', d.y0 + 1)
      .attr('width', Math.max(0, w - 2))
      .attr('height', Math.max(0, h - 2));

    const g = svg.append('g')
      .attr('clip-path', `url(#${clipId})`)
      .style('cursor', 'pointer')
      .on('mouseenter', function() {
        showPopup(svg.node(), d);
        Object.values(sectorHighlights).forEach(r => r.attr('opacity', 0));
        sectorHighlights[d.data.sector]?.attr('opacity', 1);
      })
      .on('mouseleave', function() {
        hidePopup();
        Object.values(sectorHighlights).forEach(r => r.attr('opacity', 0));
      })
      .on('click', function(event) {
        event.stopPropagation();
        hidePopup();
        if (window.parent !== window && typeof window.parent.openKrStock === 'function') {
          window.parent.openKrStock(d.data.code, d.data.name);
        } else {
          openModal(d);
        }
      });

    g.append('rect')
      .attr('x', d.x0 + 0.5).attr('y', d.y0 + 0.5)
      .attr('width', Math.max(0, w - 1))
      .attr('height', Math.max(0, h - 1))
      .attr('fill', d.data.curr_prc ? colorScale(d.data.ud_rt) : '#1e2d47')
      .attr('rx', 1);

    if (w < 10 || h < 8) return;

    const ud = d.data.ud_rt;
    const sign = ud > 0 ? '+' : '';
    const hasPrice = d.data.curr_prc > 0;
    const name = d.data.name;

    const CHAR_W = 0.88;
    const PAD    = 4;

    const fsByW  = (w - PAD) / (name.length * CHAR_W);
    const fsByH2 = (h - 8)  / 1.82;
    const fsByH1 = (h - 4)  / 1.15;

    let nameFs = Math.max(1, Math.min(24, Math.min(fsByW, hasPrice ? fsByH2 : fsByH1)));
    const udFs = nameFs * 0.78;
    const showUd = hasPrice && (nameFs + udFs + 8) <= h && udFs >= 6;

    if (!showUd) nameFs = Math.max(1, Math.min(24, Math.min(fsByW, fsByH1)));

    const blockH = showUd ? nameFs + udFs + 4 : nameFs;
    const baseY  = d.y0 + (h - blockH) / 2 + nameFs * 0.82;
    const cx     = d.x0 + w / 2;

    g.append('text')
      .attr('x', cx).attr('y', baseY)
      .attr('text-anchor', 'middle')
      .attr('fill', '#ffffff')
      .attr('font-size', nameFs + 'px')
      .attr('font-weight', '700')
      .text(name);

    if (showUd) {
      g.append('text')
        .attr('x', cx).attr('y', baseY + nameFs * 0.22 + udFs + 2)
        .attr('text-anchor', 'middle')
        .attr('fill', 'rgba(255,255,255,0.90)')
        .attr('font-size', udFs + 'px')
        .attr('font-weight', '500')
        .text(`${sign}${ud.toFixed(2)}%`);
    }
  });

  // ── 섹터 하이라이트 overlay — 모든 셀 위에 그림 ──
  (root.children || []).forEach(sec => {
    const sw = sec.x1 - sec.x0;
    const sh = sec.y1 - sec.y0;
    const hl = svg.append('rect')
      .attr('x', sec.x0 + 1).attr('y', sec.y0 + 1)
      .attr('width', Math.max(0, sw - 2))
      .attr('height', Math.max(0, sh - 2))
      .attr('fill', 'rgba(255,255,255,0.13)')
      .attr('stroke', '#ffffff')
      .attr('stroke-width', '2')
      .attr('rx', 3)
      .attr('opacity', 0)
      .style('pointer-events', 'none');
    sectorHighlights[sec.data.name] = hl;
  });

  wrap.appendChild(svg.node());
}

function calcStat(stocks) {
  const withPrice = stocks.filter(s => s.curr_prc > 0);
  if (!withPrice.length) return '';
  const up   = withPrice.filter(s => s.ud_rt > 0).length;
  const down = withPrice.filter(s => s.ud_rt < 0).length;
  const flat = withPrice.length - up - down;
  return `상승 ${up}  하락 ${down}  보합 ${flat}`;
}

async function load() {
  try {
    const t = Date.now();
    const [mapRes, liveRes] = await Promise.all([
      fetch(DATA_URL + '?t=' + t),
      fetch('api/kr_prices_live.json?t=' + t),
    ]);
    const data = await mapRes.json();
    const live = liveRes.ok ? await liveRes.json() : null;
    const livePrices = live?.prices || {};
    const liveStatus = live?.market_status || data.market_status;

    // 실시간 시세 덮어쓰기
    data.stocks.forEach(s => {
      const p = livePrices[s.code];
      if (p) {
        s.curr_prc = p.curr_prc;
        s.ud_rt    = p.ud_rt;
        s.ud_prc   = p.ud_prc;
      }
    });

    // 헤더 갱신
    const badge = document.getElementById('statusBadge');
    badge.textContent = { KRX: '정규장', NXT_PRE: 'NXT프리', NXT_EVE: 'NXT야간', CLOSED: '장마감' }[liveStatus] || liveStatus;
    badge.className = 'status-badge status-' + liveStatus;
    const updTime = live?.updated_at || data.updated_at;
    document.getElementById('updatedAt').textContent = updTime ? '갱신 ' + updTime.slice(11, 16) : '';

    const kospi  = data.stocks.filter(s => s.market === 'KOSPI');
    const kosdaq = data.stocks.filter(s => s.market === 'KOSDAQ');

    document.getElementById('kospiStat').textContent  = calcStat(kospi);
    document.getElementById('kosdaqStat').textContent = calcStat(kosdaq);

    buildTreemap('kospiWrap', kospi);
    buildTreemap('kosdaqWrap', kosdaq);
  } catch(e) {
    console.error('데이터 로드 실패:', e);
  }
}

// 초기 로드
load();
setInterval(load, REFRESH_MS);

// 리사이즈 시 재렌더
let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(load, 200);
});

// ── 탭 스크롤 ──
function scrollToMarket(market) {
  const el = document.getElementById(market === 'kospi' ? 'sectionKospi' : 'sectionKosdaq');
  if (!el) return;
  const fixedH = document.getElementById('header').offsetHeight
               + document.getElementById('mkt-nav').offsetHeight;
  const top = el.getBoundingClientRect().top + window.scrollY - fixedH - 4;
  window.scrollTo({ top, behavior: 'smooth' });
}

// 스크롤 위치에 따라 활성 탭 업데이트
function updateActiveTab() {
  const fixedH = document.getElementById('header').offsetHeight
               + document.getElementById('mkt-nav').offsetHeight;
  const kosdaqTop = document.getElementById('sectionKosdaq')?.getBoundingClientRect().top ?? Infinity;
  const isKosdaq = kosdaqTop <= fixedH + 40;
  document.getElementById('tabKospi').classList.toggle('active', !isKosdaq);
  document.getElementById('tabKosdaq').classList.toggle('active', isKosdaq);
}
window.addEventListener('scroll', updateActiveTab, { passive: true });
</script>
